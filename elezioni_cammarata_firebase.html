.io{display:flex;gap:8px;flex-wrap:wrap}
.conn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--gn);font-family:'DM Mono',monospace}

@media(max-width:480px){.kg{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}.cpg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}}
</style>

<!-- FIREBASE SDK (modulare v10) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot, collection,
  enableIndexedDbPersistence, serverTimestamp, addDoc, query, orderBy, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(window.firebaseConfig);
const db  = getFirestore(app);

// Persistenza offline: se il wifi cade, continua a salvare in locale e sincronizza quando torna
try {
  await enableIndexedDbPersistence(db).catch(() => {});
} catch(e) {}

// Espone Firebase globalmente per il resto dell'app
window.fb = { db, doc, setDoc, getDoc, onSnapshot, collection, serverTimestamp, addDoc, query, orderBy, limit };
window.fbReady = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

<!-- LOGIN SCREEN -->
<div class="pwo" id="pw-screen">

<script>
// Espone firebaseConfig allo script module
window.firebaseConfig = firebaseConfig;

/* ══ STATO ═════════════════════════════════════════════════ */
let view='home', userRole=null, userSez=null, selSez=null;
let allData={}, fd={}, bData={tipo:null,sindaco:null,lista:null,prefs:[]};
let lastBallot=null, charts={}, timerC=null, clockI=null;
let selRoleVal='coord', selSezLogin=null;
let CANDS=[], listaNomi=[C1.lista, C2.lista];
let isOnline=navigator.onLine, fbReady=false;
let unsubSez=null, unsubCfg=null;

/* ══ FIREBASE WRAPPER ══════════════════════════════════════ */
window.addEventListener('fb-ready', ()=>{fbReady=true;onFbReady()});
if(window.fbReady)fbReady=true;
window.addEventListener('online', ()=>{isOnline=true;updateConnUI()});
window.addEventListener('offline',()=>{isOnline=false;updateConnUI()});

function updateConnUI(){
  const el=document.querySelector('.conn-indicator');
  if(el){el.className='conn-indicator conn '+(isOnline?'':'off');el.innerHTML=(isOnline?'<span class="asdot"></span> online':'<span class="asdot off"></span> offline')}
}

async function fbSaveSez(i,d){
  if(!fbReady)return;
  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db,'sezioni',String(i)),{...d,_token:FB_TOKEN,_updatedAt:new Date().toISOString()});
  }catch(e){console.error('FB save err',e)}
}
async function fbSaveCfg(){
  if(!fbReady)return;
  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db,'config','main'),{
      cands:CANDS,liste:listaNomi,_token:FB_TOKEN,_updatedAt:new Date().toISOString()
    });
  }catch(e){console.error('FB cfg err',e)}
}
async function fbLogEvent(evt){
  if(!fbReady)return;
  try{
    await window.fb.addDoc(window.fb.collection(window.fb.db,'eventi'),{
      ...evt, _token:FB_TOKEN, ts:new Date().toISOString(), ua:navigator.userAgent.slice(0,50)
    });
  }catch(e){}
}

function onFbReady(){
  // All'avvio: listener in tempo reale sulle sezioni + configurazione
  try{
    window.fb.onSnapshot(window.fb.collection(window.fb.db,'sezioni'), snap=>{
      const fresh={};
      snap.forEach(doc=>{fresh[doc.id]={...defSez(),...doc.data()}});
      for(let i=1;i<=N;i++){allData[i]=fresh[String(i)]||defSez()}
      cacheSave();
      // Aggiorna la UI se siamo in una vista che mostra i dati
      if(view==='home')showHome();
      else if(view==='dash')updDash();
      else if(view==='listdash')renListDash();
      else if(view==='sez' && String(selSez) in fresh){
        fd={...defSez(),...fresh[String(selSez)]};
        renSez();
      }
    });
    window.fb.onSnapshot(window.fb.doc(window.fb.db,'config','main'), snap=>{
      if(snap.exists()){
        const data=snap.data();
        if(data.cands && Array.isArray(data.cands) && data.cands.length===2){
          CANDS=data.cands.map(list=>list.map(c=>typeof c==='string'?{nome:c,genere:'M'}:{nome:c.nome||'',genere:c.genere||'M'}));
        }
        if(data.liste && Array.isArray(data.liste) && data.liste.length===2){
          listaNomi=data.liste;
        }
        cacheSave();
        // Refresh UI se in una vista dove si vedono nomi/candidati
        if(view==='home')showHome();
        else if(view==='dash')renDash();
        else if(view==='listdash')renListDash();
        else if(view==='sez')renSez();
        else if(view==='ballot')renBallot();
        else if(view==='admin')showAdmin();
      }
    });
  }catch(e){console.error('FB listen err',e)}
  const s=$('pw-fb-status');if(s){s.innerHTML='<span style="color:var(--gn)">● Connesso al server</span>'}
}

/* ══ BACKUP AUTOMATICI (ogni 2 minuti) ═════════════════════
   Tiene le ultime 30 versioni del database in localStorage
   Il coordinatore può ripristinare l'ultimo backup in caso di sabotaggio
═══════════════════════════════════════════════════════════ */
const BK_KEY='cam5_backups';
const BK_MAX=30;        // massimo 30 backup storici (= 1 ora di copertura)
const BK_INTERVAL=2*60*1000;  // 2 minuti
let bkTimer=null;

function loadBackups(){
  try{const r=localStorage.getItem(BK_KEY);if(r)return JSON.parse(r)}catch(e){}
  return [];
}
function saveBackups(list){
  try{localStorage.setItem(BK_KEY,JSON.stringify(list))}catch(e){}
}
function makeBackup(reason='auto'){
  // Crea snapshot dei dati correnti
  const snap={
    ts:new Date().toISOString(),
    reason, // 'auto', 'manual', 'pre-reset'
    allData:JSON.parse(JSON.stringify(allData)),
    CANDS:JSON.parse(JSON.stringify(CANDS)),
    listaNomi:JSON.parse(JSON.stringify(listaNomi))
  };
  const list=loadBackups();
  list.unshift(snap);
  // Tieni solo BK_MAX backup
  if(list.length>BK_MAX)list.length=BK_MAX;
  saveBackups(list);
  return snap;
}
function startBackupTimer(){
  // Solo il coordinatore fa backup automatici
  if(userRole!=='coord')return;
  clearInterval(bkTimer);
  // Primo backup subito dopo 10 secondi (dà tempo a Firebase di caricare i dati)
  setTimeout(()=>{makeBackup('auto')},10000);
  bkTimer=setInterval(()=>{makeBackup('auto')},BK_INTERVAL);
}
async function restoreBackup(bkIndex){
  const list=loadBackups();
  const bk=list[bkIndex];
  if(!bk){alert('Backup non trovato');return}
  if(!confirm(`Ripristinare il backup del ${new Date(bk.ts).toLocaleTimeString('it-IT')}? I dati attuali verranno sovrascritti su TUTTI i dispositivi.`))return;
  // Backup di sicurezza prima di ripristinare (per undo-dell-undo)
  makeBackup('pre-restore');
  // Ripristino: scrivi tutto su Firebase
  for(let i=1;i<=N;i++){
    const sez=bk.allData[i]||defSez();
    await fbSaveSez(i,sez);
  }
  if(bk.CANDS)CANDS=bk.CANDS;
  if(bk.listaNomi)listaNomi=bk.listaNomi;
  await fbSaveCfg();
  fbLogEvent({tipo:'restore_backup',ts:bk.ts});
  alert('Backup ripristinato correttamente.');
  goHome();
}
function downloadBackup(bkIndex){
  const list=loadBackups();
  const bk=list[bkIndex];
  if(!bk)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(bk,null,2)],{type:'application/json'}));
  a.download='backup_'+COMUNE.toLowerCase()+'_'+bk.ts.slice(0,19).replace(/[:.]/g,'-')+'.json';
  a.click();
}
function deleteBackup(bkIndex){
  if(!confirm('Cancellare questo backup dalla lista locale?'))return;
  const list=loadBackups();
  list.splice(bkIndex,1);
  saveBackups(list);
  showBackups();
}

const pct = v=>v.toFixed(1)+'%';

/* Regola genere: 1 pref → libera (M o F); 2 pref → obbligatoriamente 1M + 1F */
function genderErr(prefs,cands){
  if(prefs.length<2)return null;
  const gs=prefs.map(j=>(cands[j]?.genere||'M'));
  const hasM=gs.includes('M'), hasF=gs.includes('F');
  if(!hasM||!hasF){
    return 'Con 2 preferenze devi scegliere 1 uomo e 1 donna';
  }
  return null;
}
function wouldViolate(j,prefs,cands){
  if(prefs.length===0)return false;
  const np=[...prefs,j];
  const gs=np.map(k=>(cands[k]?.genere||'M'));
  const hasM=gs.includes('M'),hasF=gs.includes('F');
  if(np.length===2&&(!hasM||!hasF))return true;
  return false;
}

function totals(d){
  let vt=0,bi=0,nu=0,vc1=0,vc2=0,el=0,vd=0;const p1={},p2={};
  for(let i=1;i<=N;i++){
    const s=d[i]||defSez();
    vt+=num(s.votanti);bi+=num(s.bianche);nu+=num(s.nulle);
    vc1+=num(s.vc1);vc2+=num(s.vc2);el+=EL[i-1];vd+=num(s.vd);
    for(let j=0;j<12;j++){
      p1[j]=(p1[j]||0)+num(s.p1&&s.p1[j]);
      p2[j]=(p2[j]||0)+num(s.p2&&s.p2[j]);
    }
  }
  const tv=vc1+vc2;
  return{vt,bi,nu,vc1,vc2,el,tv,p1,p2,vd,
    aff:el>0?vt/el*100:0,pc1:tv>0?vc1/tv*100:0,pc2:tv>0?vc2/tv*100:0};
}

function selTipo(t){bData.tipo=t;if(t!=='valida'){bData.sindaco=null;bData.lista=null;bData.prefs=[];}renBallot()}
function selSindaco(s){bData.sindaco=s;bData.lista=s;bData.prefs=[];renBallot()}
function selLista(l){bData.lista=l;bData.prefs=[];renBallot()}
function togPref(j){
  const i=bData.prefs.indexOf(j);
  if(i>=0)bData.prefs.splice(i,1);
  else if(bData.prefs.length<MPREF)bData.prefs.push(j);
  renBallot();
}

async function confirmBallot(){
  const d=bData;
  fd.votanti=(fd.votanti||0)+1;
  if(d.tipo==='bianca')fd.bianche=(fd.bianche||0)+1;
  else if(d.tipo==='nulla')fd.nulle=(fd.nulle||0)+1;
  else{
    if(d.sindaco===1)fd.vc1=(fd.vc1||0)+1;else fd.vc2=(fd.vc2||0)+1;
    if(d.sindaco!==d.lista){
      fd.vd=(fd.vd||0)+1;
      if(d.sindaco===1)fd.vd12=(fd.vd12||0)+1;else fd.vd21=(fd.vd21||0)+1;
    }
    const pk=d.lista===1?'p1':'p2';
    if(!fd[pk])fd[pk]={};
    d.prefs.forEach(j=>{fd[pk][j]=(fd[pk][j]||0)+1});
  }
  lastBallot=JSON.parse(JSON.stringify(d));
  fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'scheda',sezione:selSez,tipoScheda:d.tipo,sindaco:d.sindaco,lista:d.lista,nPrefs:d.prefs.length,disgiunto:d.sindaco!==d.lista});
  view='sez';renSez();
  setTimeout(()=>{
    const m=$('sez-msg');
    if(m){
      m.innerHTML=`<div class="no nok">Scheda #${num(fd.votanti)} salvata sul server${d.sindaco!==d.lista&&d.tipo==='valida'?' · voto disgiunto':''}</div>`;
      setTimeout(()=>{if(m)m.innerHTML=''},2800);
    }
  },30);
}

async function undoLast(){
  if(!lastBallot)return;const d=lastBallot;
  fd.votanti=Math.max(0,(fd.votanti||0)-1);
  if(d.tipo==='bianca')fd.bianche=Math.max(0,(fd.bianche||0)-1);
  else if(d.tipo==='nulla')fd.nulle=Math.max(0,(fd.nulle||0)-1);
  else{
    if(d.sindaco===1)fd.vc1=Math.max(0,(fd.vc1||0)-1);else fd.vc2=Math.max(0,(fd.vc2||0)-1);
    if(d.sindaco!==d.lista){
      fd.vd=Math.max(0,(fd.vd||0)-1);
      if(d.sindaco===1)fd.vd12=Math.max(0,(fd.vd12||0)-1);else fd.vd21=Math.max(0,(fd.vd21||0)-1);
    }
    const pk=d.lista===1?'p1':'p2';
    if(fd[pk])d.prefs.forEach(j=>{if(fd[pk][j]!==undefined)fd[pk][j]=Math.max(0,fd[pk][j]-1)});
  }
  lastBallot=null;fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'undo',sezione:selSez});
  renSez();
}

      </div>
    </div>

    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="card" style="margin:0">
        <span class="ct" style="color:${colMid}">classifica preferenze</span>
        <canvas id="ch-list" height="260"></canvas>
      </div>
      <div class="card" style="margin:0">
        <span class="ct" style="color:${colMid}">top 5</span>
        ${top5HTML||'<p style="font-size:12px;color:var(--tx3)">Nessuna preferenza ancora registrata</p>'}
      </div>
    </div>

    <div class="card">
      <span class="ct" style="color:${colMid}">dettaglio candidato × sezione</span>
      <div style="overflow-x:auto">
        <table class="tbl" style="min-width:700px">
          <thead><tr>${tblHdr.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${tblRows}${totalRow}</tbody>
        </table>
      </div>
    </div>

    <div class="io" style="margin-top:8px">
      <button class="btn bg" onclick="exportListCSV(${idx})">📊 Esporta CSV lista</button>
      <button class="btn" onclick="showDash()">Dashboard Generale</button>
      <button class="btn" onclick="showListDash(${idx===0?1:0})">Dashboard ${listaNomi[idx===0?1:0]}</button>
    </div>
  `;

  startClock();

  // Chart orizzontale con tutti i 12 candidati
  const ctx=$('ch-list');
  if(ctx){
    if(charts.list)charts.list.destroy();
    charts.list=new Chart(ctx,{type:'bar',
      data:{
        labels:sorted.map(c=>c.nome.length>20?c.nome.slice(0,18)+'…':c.nome),
        datasets:[{data:sorted.map(c=>c.totale),backgroundColor:colHex,borderRadius:3,borderSkipped:false}]
      },
      options:{indexAxis:'y',responsive:true,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fn(ctx.parsed.x)} preferenze`}}},
        scales:{
          x:{grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{size:11},color:'#888'}},
          y:{grid:{display:false},ticks:{font:{size:11},color:'#444'}}
        }
      }
    });
  }
}

function exportListCSV(idx){
  const listName=listaNomi[idx];
  const cands=CANDS[idx]||[];
  const pk=idx===0?'p1':'p2';
  const t=totals(allData);
  const prefsByCand=idx===0?t.p1:t.p2;
  const q=v=>`"${String(v).replace(/"/g,'""')}"`;

  const enriched=cands.map((c,j)=>({
    nome:c.nome||('Candidato '+(j+1)),genere:c.genere||'M',totale:prefsByCand[j]||0,
    sezioni:Array.from({length:N},(_,i)=>num((allData[i+1]||defSez())[pk]&&(allData[i+1]||defSez())[pk][j]))
  })).sort((a,b)=>b.totale-a.totale);

  const rows=[];
  rows.push(['LISTA '+listName+' — '+COMUNE,'Data: '+DATA_EL,'Generato: '+new Date().toLocaleString('it-IT')].join(','));
  rows.push('');
  rows.push(['Posizione','Candidato','Genere','Totale',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))].join(','));
  enriched.forEach((c,pos)=>{
    rows.push([pos+1,q(c.nome),c.genere,c.totale,...c.sezioni].join(','));
  });

  const csv='\uFEFF'+rows.join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='lista_'+listName.toLowerCase().replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  fbLogEvent({tipo:'export_lista_csv',lista:idx});
}

/* ══ EXPORT CSV ═════════════════════════════════════════════ */
function exportCSV(){
  const d=allData,t=totals(d),q=v=>`"${String(v).replace(/"/g,'""')}"`;
  const rows=[];
  rows.push(['ELEZIONI COMUNALI — '+COMUNE,'Data: '+DATA_EL,'Generato: '+new Date().toLocaleString('it-IT')].join(','));
  rows.push('');rows.push('=== RIEPILOGO GENERALE ===');
  rows.push(['Elettori totali',t.el,''].join(','));rows.push(['Votanti',t.vt,pct(t.aff)+' affluenza'].join(','));
  rows.push(['Bianche',t.bi,''].join(','));rows.push(['Nulle',t.nu,''].join(','));
  rows.push(['Voti validi sindaco',t.tv,''].join(','));rows.push(['Voti disgiunti',t.vd,''].join(','));
  rows.push('');rows.push('=== VOTI SINDACO ===');
  rows.push([q(C1.nome+' ('+listaNomi[0]+')'),t.vc1,pct(t.pc1)].join(','));
  rows.push([q(C2.nome+' ('+listaNomi[1]+')'),t.vc2,pct(t.pc2)].join(','));
  rows.push('');rows.push('=== DETTAGLIO PER SEZIONE ===');
  rows.push(['Sezione','Elettori','Votanti','Affluenza%','Bianche','Nulle',q(C1.nome),q(C2.nome),'Disgiunti','Stato'].join(','));
  for(let i=1;i<=N;i++){
    const s=d[i]||defSez(),el=EL[i-1],af=el>0?(num(s.votanti)/el*100).toFixed(2):'0.00';
    rows.push([i,el,num(s.votanti),af,num(s.bianche),num(s.nulle),num(s.vc1),num(s.vc2),num(s.vd),s.done?'Completata':s.upd?'Parziale':'Attesa'].join(','));
  }
  for(let li=0;li<2;li++){
    rows.push('');rows.push(`=== PREFERENZE LISTA ${listaNomi[li]} ===`);
    rows.push(['Candidato','Genere','Totale',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))].join(','));
    for(let j=0;j<12;j++){
      const cand=CANDS[li][j]||{nome:'Candidato '+(j+1),genere:'M'};
      const pk=li===0?'p1':'p2';
      const sv=Array.from({length:N},(_,i)=>num((d[i+1]||defSez())[pk]&&(d[i+1]||defSez())[pk][j]));
      rows.push([q(cand.nome),cand.genere||'M',sv.reduce((a,b)=>a+b,0),...sv].join(','));
    }
  }
  const csv='\uFEFF'+rows.join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='risultati_'+COMUNE.toLowerCase()+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  fbLogEvent({tipo:'export_csv'});
}
function exportJSON(){
  const exp={};for(let i=1;i<=N;i++)exp['sez_'+i]=allData[i]||defSez();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({comune:COMUNE,exportedAt:new Date().toISOString(),sezioni:exp,cands:CANDS,liste:listaNomi},null,2)],{type:'application/json'}));
  a.download='elezioni_'+COMUNE.toLowerCase()+'_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  fbLogEvent({tipo:'export_json'});
}
async function resetAll(){
  if(!confirm('Cancellare TUTTI i dati di scrutinio dal SERVER? Azione irreversibile e impatta TUTTI i dispositivi.'))return;
  if(!confirm('Ultima conferma: questo cancella i dati da tutti i dispositivi collegati. Un backup di sicurezza verrà creato automaticamente prima del reset. Continuo?'))return;
  makeBackup('pre-reset');
  for(let i=1;i<=N;i++){await fbSaveSez(i,defSez())}
  fbLogEvent({tipo:'reset_all'});
  alert('Dati azzerati. Un backup è disponibile nella sezione Backup per il ripristino.');
  goHome();
}
