<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elezioni Comunali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="montecarlo.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:#F5F3EE;color:#1A1A18;min-height:100vh;line-height:1.5}
:root{
  --c1:#1B5299;--c1l:#D8E8F7;--c1m:#2B6BB5;--c1t:#0D3666;
  --c2:#B84020;--c2l:#FAE8E3;--c2m:#C8512A;--c2t:#7A2810;
  --gn:#2D6A35;--gnl:#E3F2E5;--am:#7A5010;--aml:#FDF0DA;
  --sf:#FFF;--sf2:#EFEDE8;--bd:rgba(0,0,0,.1);--bds:rgba(0,0,0,.18);
  --tx:#1A1A18;--tx2:#5A5A54;--tx3:#9A9A90;--r:12px;--rs:8px
}
#root{max-width:640px;margin:0 auto;padding:0 1rem 3rem}
.wide{max-width:1020px!important}
.tb{display:flex;align-items:center;justify-content:space-between;padding:1.125rem 0 .875rem;border-bottom:1px solid var(--bd);margin-bottom:1.25rem;position:sticky;top:0;background:#F5F3EE;z-index:10}
.tb-t{font-size:15px;font-weight:600}
.tb-s{font-size:11px;color:var(--tx3);margin-top:1px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--rs);border:1px solid var(--bds);background:var(--sf);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s,transform .08s}
.btn:hover{background:var(--sf2)}.btn:active{transform:scale(.97)}.btn[disabled]{opacity:.32;cursor:not-allowed;transform:none}
.bp{background:var(--c1);color:#fff;border-color:var(--c1t)}.bp:hover{background:var(--c1m)}
.bg{background:var(--gn);color:#fff;border-color:#1E4D25}.bg:hover{background:#245A2C}
.bd2{color:#8B1A1A;border-color:#C44}.bd2:hover{background:#FEF0F0}
.bw{width:100%;padding:14px;font-size:15px}.blg{padding:16px;font-size:16px;font-weight:600}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sc{padding:18px 6px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);text-align:center;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:4px}
.sc:hover{border-color:var(--c1);background:var(--c1l)}.sc.done{border-color:var(--gn);background:var(--gnl)}.sc.part{border-color:var(--c1m)}
.sc .sn{font-size:22px;font-weight:700}.sc .ss{font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace}
.sc.done .sn{color:var(--gn)}.sc.done .ss{color:var(--gn)}.sc.part .sn{color:var(--c1)}
.kg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem 1rem}
.kl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:5px}
.kv{font-size:24px;font-weight:700;line-height:1}
.ks{font-size:11px;color:var(--tx3);margin-top:4px;font-family:'DM Mono',monospace}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cb{border-radius:var(--r);padding:1rem 1.125rem;border:1px solid}
.cb1{background:var(--c1l);border-color:#A8CAEA}.cb2{background:var(--c2l);border-color:#EAB8A8}
.cl2{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.cn{font-size:14px;font-weight:600;margin-bottom:10px}.cv{font-size:30px;font-weight:700;line-height:1}.cp{font-size:12px;margin-top:3px;font-family:'DM Mono',monospace}
.cb1 .cl2{color:var(--c1m)}.cb1 .cn{color:var(--c1t)}.cb1 .cv{color:var(--c1)}.cb1 .cp{color:var(--c1m)}
.cb2 .cl2{color:var(--c2m)}.cb2 .cn{color:var(--c2t)}.cb2 .cv{color:var(--c2)}.cb2 .cp{color:var(--c2m)}
.pt{height:5px;background:rgba(0,0,0,.1);border-radius:3px;margin-top:10px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s ease}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:10px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:12px;display:block}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);border-bottom:1px solid var(--bd);font-weight:500}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--bd)}.tbl tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;font-family:'DM Mono',monospace}
.bok{background:var(--gnl);color:var(--gn)}.bwip{background:var(--aml);color:var(--am)}.bwt{background:var(--sf2);color:var(--tx3)}
.bdis{background:#FFF4E8;color:#9A5A00;border:1px solid #F0C870}
.gb{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}
.gbm{background:#E8EFF8;color:#1B5299}.gbf{background:#FDE8F0;color:#8B2252}
.tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
.tb2{padding:20px 8px;border:1px solid var(--bds);border-radius:var(--r);background:var(--sf);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;transition:all .12s}
.tb2:hover{border-color:var(--c1);background:var(--c1l)}
.ti{font-size:22px;margin-bottom:6px}.tl{font-size:13px;font-weight:600}
.tb2.sv{border:2px solid var(--c1);background:var(--c1l)}
.tb2.sb{border:2px solid #888;background:var(--sf2)}
.tb2.sn2{border:2px solid #C44;background:#FEF0F0}
.cpg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.cpb{padding:18px 14px;border-radius:var(--r);text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:2px solid}
.cc1{background:var(--c1l);border-color:#A8CAEA}.cc1:hover{border-color:var(--c1)}.cc1.sel{border-color:var(--c1);box-shadow:0 0 0 4px rgba(27,82,153,.12)}
.cc2{background:var(--c2l);border-color:#EAB8A8}.cc2:hover{border-color:var(--c2)}.cc2.sel{border-color:var(--c2);box-shadow:0 0 0 4px rgba(184,64,32,.12)}
.cpl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.cpn{font-size:14px;font-weight:600}
.cc1 .cpl{color:var(--c1m)}.cc1 .cpn{color:var(--c1t)}.cc2 .cpl{color:var(--c2m)}.cc2 .cpn{color:var(--c2t)}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.pb{padding:11px 10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;text-align:left;display:flex;align-items:center;gap:7px;transition:border-color .1s,background .1s;line-height:1.3;min-height:44px}
.pb:hover:not([disabled]){border-color:var(--c1);background:var(--c1l)}
.pb.p1{border:1.5px solid var(--c1);background:var(--c1l);color:var(--c1t)}
.pb.p2{border:1.5px solid var(--c2);background:var(--c2l);color:var(--c2t)}
.pb[disabled]{opacity:.28;cursor:not-allowed}
.pnum{min-width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.pnum.n1{background:var(--c1)}.pnum.n2{background:var(--c2)}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sl::before{content:attr(data-n);min-width:18px;height:18px;border-radius:50%;background:var(--sf2);color:var(--tx2);font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace}
.sdiv{height:1px;background:var(--bd);margin:1rem 0}
.sr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)}
.sr:last-child{border-bottom:none}
.srl{font-size:13px;color:var(--tx2)}.srv{font-size:14px;font-weight:600;font-family:'DM Mono',monospace}
.no{padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:10px;animation:fin .25s}
.nok{background:var(--gnl);color:var(--gn);border:1px solid #A8D4AC}
.ner{background:#FEF0F0;color:#8B1A1A;border:1px solid #E8BBBB}
.nin{background:var(--c1l);color:var(--c1t);border:1px solid #A8CAEA}
.nwa{background:#FFF4E8;color:#9A5A00;border:1px solid #F0C870}
@keyframes fin{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.asdot{width:7px;height:7px;border-radius:50%;background:var(--gn);display:inline-block;animation:pulse 2s infinite}
.asdot.off{background:#C44}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.inp{width:100%;padding:11px 14px;border:1px solid var(--bds);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--sf);color:var(--tx)}
.inp:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px rgba(27,82,153,.1)}
.ism{padding:8px 10px;font-size:13px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;background:var(--sf);color:var(--tx);width:100%}
.ism:focus{outline:none;border-color:var(--c1)}
.gtog{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--bd);flex-shrink:0}
.gtog button{padding:5px 9px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;border:none;cursor:pointer;background:var(--sf2);color:var(--tx3);transition:all .1s}
.gtog button.am{background:#E8EFF8;color:#1B5299}.gtog button.af{background:#FDE8F0;color:#8B2252}
.ar{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.ar .idx{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3);min-width:20px;text-align:right;flex-shrink:0}
.pwo{position:fixed;inset:0;background:#F5F3EE;display:flex;align-items:center;justify-content:center;z-index:999;padding:1.5rem}
.pwb{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:2rem;width:100%;max-width:340px}
.pwt{font-size:18px;font-weight:700;margin-bottom:3px}
.pws{font-size:13px;color:var(--tx3);margin-bottom:20px}
.pwi{width:100%;padding:14px;border:1px solid var(--bds);border-radius:var(--rs);font-family:'DM Mono',monospace;font-size:24px;background:var(--sf);color:var(--tx);margin-bottom:10px;text-align:center;letter-spacing:10px}
.pwi:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px rgba(27,82,153,.1)}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.rb{padding:14px 10px;border:1px solid var(--bds);border-radius:var(--r);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;transition:all .12s;background:var(--sf)}
.rb:hover{border-color:var(--c1);background:var(--c1l)}.rb.sel{border:2px solid var(--c1);background:var(--c1l)}
.ri{font-size:22px;margin-bottom:5px}.rl{font-size:12px;font-weight:600;color:var(--tx2)}
.io{display:flex;gap:8px;flex-wrap:wrap}
.conn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--gn);font-family:'DM Mono',monospace}
.conn.off{color:#C44}
@media(max-width:480px){.kg{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}.cpg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}}
/* ══ Modal overlay ═══════════════════════════════════════ */
.mod-o{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;animation:fin .2s}
.mod-b{background:var(--sf);border-radius:var(--r);max-width:420px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
</style>
</head>

<script>
// Espone firebaseConfig allo script module
window.firebaseConfig = firebaseConfig;

/* ══ STATO ═════════════════════════════════════════════════ */
let view='home', userRole=null, userSez=null, selSez=null;
let allData={}, fd={}, bData={tipo:null,sindaco:null,lista:null,prefs:[]};
let lastBallot=null, charts={}, timerC=null, clockI=null;
let selRoleVal='coord', selSezLogin=null;
let CANDS=[], listaNomi=[C1.lista, C2.lista];
let isOnline=navigator.onLine, fbReady=false;
let unsubSez=null, unsubCfg=null;

/* ══ FIREBASE WRAPPER ══════════════════════════════════════ */
window.addEventListener('fb-ready', ()=>{fbReady=true;onFbReady()});
if(window.fbReady)fbReady=true;
window.addEventListener('online', ()=>{isOnline=true;updateConnUI()});
window.addEventListener('offline',()=>{isOnline=false;updateConnUI()});

function updateConnUI(){
  const el=document.querySelector('.conn-indicator');
  if(el){el.className='conn-indicator conn '+(isOnline?'':'off');el.innerHTML=(isOnline?'<span class="asdot"></span> online':'<span class="asdot off"></span> offline')}
}

async function fbSaveSez(i,d){
  if(!fbReady)return;
  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db,'sezioni',String(i)),{...d,_token:FB_TOKEN,_updatedAt:new Date().toISOString()});
  }catch(e){console.error('FB save err',e)}
}
async function fbSaveCfg(){
  if(!fbReady)return;
  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db,'config','main'),{
      cands:CANDS,liste:listaNomi,_token:FB_TOKEN,_updatedAt:new Date().toISOString()
    });
  }catch(e){console.error('FB cfg err',e)}
}
async function fbLogEvent(evt){
  if(!fbReady)return;
  try{
    await window.fb.addDoc(window.fb.collection(window.fb.db,'eventi'),{
      ...evt, _token:FB_TOKEN, ts:new Date().toISOString(), ua:navigator.userAgent.slice(0,50)
    });
  }catch(e){}
}

function onFbReady(){
  // All'avvio: listener in tempo reale sulle sezioni + configurazione
  try{
    window.fb.onSnapshot(window.fb.collection(window.fb.db,'sezioni'), snap=>{
      const fresh={};
      snap.forEach(doc=>{fresh[doc.id]={...defSez(),...doc.data()}});
      for(let i=1;i<=N;i++){allData[i]=fresh[String(i)]||defSez()}
      cacheSave();
      // Aggiorna la UI se siamo in una vista che mostra i dati
      if(view==='home')showHome();
      else if(view==='dash')updDash();
      else if(view==='public')updPublicDash();
      else if(view==='listdash')renListDash();
      else if(view==='analytics')renAnalyticsContent();
      else if(view==='sez' && String(selSez) in fresh){
        fd={...defSez(),...fresh[String(selSez)]};
        renSez();
      }
    });
    window.fb.onSnapshot(window.fb.doc(window.fb.db,'config','main'), snap=>{
      if(snap.exists()){
        const data=snap.data();
        if(data.cands && Array.isArray(data.cands) && data.cands.length===2){
          CANDS=data.cands.map(list=>list.map(c=>typeof c==='string'?{nome:c,genere:'M'}:{nome:c.nome||'',genere:c.genere||'M'}));
        }
        if(data.liste && Array.isArray(data.liste) && data.liste.length===2){
          listaNomi=data.liste;
        }
        cacheSave();
        // Refresh UI se in una vista dove si vedono nomi/candidati
        if(view==='home')showHome();
        else if(view==='dash')renDash();
        else if(view==='public')showPublicDash();
        else if(view==='listdash')renListDash();
        else if(view==='analytics')renAnalytics();
        else if(view==='sez')renSez();
        else if(view==='ballot')renBallot();
        else if(view==='admin')showAdmin();
      }
    });
  }catch(e){console.error('FB listen err',e)}
  const s=$('pw-fb-status');if(s){s.innerHTML='<span style="color:var(--gn)">● Connesso al server</span>'}
}

/* ══ BACKUP AUTOMATICI (ogni 2 minuti) ═════════════════════
   Tiene le ultime 30 versioni del database in localStorage
   Il coordinatore può ripristinare l'ultimo backup in caso di sabotaggio
═══════════════════════════════════════════════════════════ */
const BK_KEY='cam5_backups';
const BK_MAX=30;        // massimo 30 backup storici (= 1 ora di copertura)
const BK_INTERVAL=2*60*1000;  // 2 minuti
let bkTimer=null;

function loadBackups(){
  try{const r=localStorage.getItem(BK_KEY);if(r)return JSON.parse(r)}catch(e){}
  return [];
}
function saveBackups(list){
  try{localStorage.setItem(BK_KEY,JSON.stringify(list))}catch(e){}
}
function makeBackup(reason='auto'){
  // Crea snapshot dei dati correnti
  const snap={
    ts:new Date().toISOString(),
    reason, // 'auto', 'manual', 'pre-reset'
    allData:JSON.parse(JSON.stringify(allData)),
    CANDS:JSON.parse(JSON.stringify(CANDS)),
    listaNomi:JSON.parse(JSON.stringify(listaNomi))
  };
  const list=loadBackups();
  list.unshift(snap);
  // Tieni solo BK_MAX backup
  if(list.length>BK_MAX)list.length=BK_MAX;
  saveBackups(list);
  return snap;
}
function startBackupTimer(){
  // Solo admin e coordinatore fanno backup automatici
  if(userRole!=='admin'&&userRole!=='coord')return;
  clearInterval(bkTimer);
  setTimeout(()=>{makeBackup('auto')},10000);
  bkTimer=setInterval(()=>{makeBackup('auto')},BK_INTERVAL);
}
async function restoreBackup(bkIndex){
  const list=loadBackups();
  const bk=list[bkIndex];
  if(!bk){alert('Backup non trovato');return}
  if(!confirm(`Ripristinare il backup del ${new Date(bk.ts).toLocaleTimeString('it-IT')}? I dati attuali verranno sovrascritti su TUTTI i dispositivi.`))return;
  // Backup di sicurezza prima di ripristinare (per undo-dell-undo)
  makeBackup('pre-restore');
  // Ripristino: scrivi tutto su Firebase
  for(let i=1;i<=N;i++){
    const sez=bk.allData[i]||defSez();
    await fbSaveSez(i,sez);
  }
  if(bk.CANDS)CANDS=bk.CANDS;
  if(bk.listaNomi)listaNomi=bk.listaNomi;
  await fbSaveCfg();
  fbLogEvent({tipo:'restore_backup',ts:bk.ts});
  alert('Backup ripristinato correttamente.');
  goHome();
}
function downloadBackup(bkIndex){
  const list=loadBackups();
  const bk=list[bkIndex];
  if(!bk)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(bk,null,2)],{type:'application/json'}));
  a.download='backup_'+COMUNE.toLowerCase()+'_'+bk.ts.slice(0,19).replace(/[:.]/g,'-')+'.json';
  a.click();
}
function deleteBackup(bkIndex){
  if(!confirm('Cancellare questo backup dalla lista locale?'))return;
  const list=loadBackups();
  list.splice(bkIndex,1);
  saveBackups(list);
  showBackups();
}

/* Estrae etichetta breve per grafici: "Cognome" se unico, "Cognome N." se duplicato
   I cognomi composti (Lo Scrudato, La Mendola, De Maria, Mangiapane Maria) vengono gestiti:
   prendiamo tutte le parole finché non iniziamo a vedere il nome.
   Strategia semplice: "Cognome" = tutto tranne l'ultima parola che è il nome.
   Se poi ci sono doppi, aggiungiamo l'iniziale del nome. */
function extractCognome(full){
  if(!full)return '';
  const parts=full.trim().split(/\s+/);
  if(parts.length===1)return parts[0];
  // Cognome = tutte le parole tranne l'ultima
  return parts.slice(0,-1).join(' ');
}
function extractNome(full){
  if(!full)return '';
  const parts=full.trim().split(/\s+/);
  if(parts.length===1)return '';
  return parts[parts.length-1];
}
function buildShortLabels(candList){
  // Ritorna array di label brevi: "Cognome" o "Cognome I." se duplicato
  const cogs=candList.map(c=>extractCognome(c.nome||''));
  const counts={};
  cogs.forEach(c=>{counts[c]=(counts[c]||0)+1});
  return candList.map((c,i)=>{
    const cog=cogs[i];
    if(counts[cog]>1){
      const nome=extractNome(c.nome||'');
      return cog+(nome?' '+nome[0]+'.':'');
    }
    return cog;
  });
}

/* ══ PROIEZIONE CONSIGLIO COMUNALE ══════════════════════════
   Regola Cammarata (comune <15k):
   - SINDACO eletto = max(vc1, vc2)
   - LISTA vincente = max(vl1, vl2) → prende 8 consiglieri
   - LISTA perdente = altra → prende 3 consiglieri + sindaco sconfitto di diritto
   
   CASO "sindaco in minoranza": se sindaco vince ma sua lista perde:
   - Lista del sindaco vincente: 5 consiglieri (lista in minoranza)
   - Lista perdente del sindaco ma vincente come lista: 7 consiglieri
   (totale resta 12 consiglieri + sindaco vincente + sindaco sconfitto)
═══════════════════════════════════════════════════════════ */
function calcolaProiezione(){
  const t=totals(allData);

  // Vincitore sindaco (basato su vc1 vs vc2)
  let sindacoVincIdx, sindacoPerdIdx;
  if(t.vc1>t.vc2){sindacoVincIdx=0;sindacoPerdIdx=1}
  else if(t.vc2>t.vc1){sindacoVincIdx=1;sindacoPerdIdx=0}
  else{sindacoVincIdx=null;sindacoPerdIdx=null}

  // Vincitore lista (basato su vl1 vs vl2)
  let listaVincIdx, listaPerdIdx;
  if(t.vl1>t.vl2){listaVincIdx=0;listaPerdIdx=1}
  else if(t.vl2>t.vl1){listaVincIdx=1;listaPerdIdx=0}
  else{listaVincIdx=null;listaPerdIdx=null}

  const isPareggioSindaco = sindacoVincIdx===null;
  const isPareggioLista = listaVincIdx===null;
  // Caso sindaco in minoranza: sindaco vincente di una lista, ma l'altra lista ha più voti lista
  const sindacoInMinoranza = !isPareggioSindaco && !isPareggioLista && (sindacoVincIdx!==listaVincIdx);

  // Calcolo seggi per lista (escluso sindaco)
  let seggiLista1Cons, seggiLista2Cons;
  if(isPareggioSindaco || isPareggioLista){
    seggiLista1Cons=0; seggiLista2Cons=0;
  } else if(!sindacoInMinoranza){
    // ── Caso normale: sindaco e lista vincono insieme ──────────
    // Lista vincente (del sindaco): 8 consiglieri eletti per preferenze
    // Lista perdente:               3 consiglieri eletti per preferenze
    //                             + 1 sindaco sconfitto (consigliere di diritto)
    // Totale consiglio: 8 + 3 + 1 = 12 ✓
    if(sindacoVincIdx===0){seggiLista1Cons=8;seggiLista2Cons=3}
    else{seggiLista1Cons=3;seggiLista2Cons=8}
  } else {
    // ── Caso sindaco in minoranza ──────────────────────────────
    // Lista del sindaco vincente (lista perdente): 5 consiglieri per preferenze
    // Lista vincente (avversaria):                 6 consiglieri per preferenze
    //                                            + 1 sindaco sconfitto (consigliere di diritto)
    // Totale consiglio: 5 + 6 + 1 = 12 ✓
    if(sindacoVincIdx===0){seggiLista1Cons=5;seggiLista2Cons=6}
    else{seggiLista1Cons=6;seggiLista2Cons=5}
  }

  const mkClassifica=(idx)=>{
    return (CANDS[idx]||[]).map((c,j)=>({
      j, nome:c.nome||('Candidato '+(j+1)),
      genere:c.genere||'M',
      voti:(idx===0?t.p1[j]:t.p2[j])||0
    })).sort((a,b)=>b.voti-a.voti);
  };

  return {
    totals:t,
    sindacoVincIdx, sindacoPerdIdx,
    listaVincIdx, listaPerdIdx,
    isPareggioSindaco, isPareggioLista,
    sindacoInMinoranza,
    classifica1: mkClassifica(0),
    classifica2: mkClassifica(1),
    seggiLista1Cons, seggiLista2Cons,
    // seggiTotali = consiglieri per preferenze + sindaco SCONFITTO (1 seggio di diritto).
    // Il sindaco VINCENTE è capo dell'esecutivo e NON siede nel consiglio comunale.
    seggiTotali1: seggiLista1Cons + (sindacoPerdIdx===0?1:0),
    seggiTotali2: seggiLista2Cons + (sindacoPerdIdx===1?1:0)
  };
}

/* Genera SVG del parlamentino a emiciclo — 12 consiglieri (sindaco vincente NON siede in consiglio) */
function renderParlamentino(proj){
  const {sindacoVincIdx,sindacoPerdIdx,seggiLista1Cons,seggiLista2Cons,isPareggioSindaco,isPareggioLista,sindacoInMinoranza,seggiTotali1,seggiTotali2}=proj;
  const w=600, h=260;
  const cx=w/2, cy=220;

  const colL1='#1B5299', colL2='#B84020', colEmpty='#D4D0C8';

  // 12 consiglieri in emiciclo — seggiTotali1 a sinistra, seggiTotali2 a destra
  // L'ultimo posto del gruppo minoritario è il sindaco sconfitto (★)
  const seats=[];
  const r1=115, r2=160;
  const angleSpan=Math.PI;
  for(let i=0;i<6;i++){
    const a=Math.PI + (i/5)*angleSpan*0.55 + angleSpan*0.22;
    seats.push({x:cx+Math.cos(a)*r1,y:cy+Math.sin(a)*r1,r:16,row:'inner'});
  }
  for(let i=0;i<6;i++){
    const a=Math.PI + (i/5)*angleSpan*0.9 + angleSpan*0.05;
    seats.push({x:cx+Math.cos(a)*r2,y:cy+Math.sin(a)*r2,r:16,row:'outer'});
  }

  // Colorazione: seggiTotali1 da sinistra (lista 1), seggiTotali2 da destra (lista 2)
  // Il sindaco sconfitto occupa il 1° posto del suo gruppo (marcato con ◆)
  const t1=isPareggioSindaco?0:seggiTotali1;
  const t2=isPareggioSindaco?0:seggiTotali2;
  for(let i=0;i<seats.length;i++){
    if(i<t1){
      seats[i].color=colL1;
      // Il sindaco sconfitto lista 1 è l'ultimo slot del gruppo lista 1
      seats[i].isSindSconf = (!isPareggioSindaco && sindacoPerdIdx===0 && i===t1-1);
    } else if(i>=12-t2){
      seats[i].color=colL2;
      seats[i].isSindSconf = (!isPareggioSindaco && sindacoPerdIdx===1 && i===12-t2);
    } else {
      seats[i].color=colEmpty;
      seats[i].isSindSconf = false;
    }
  }

  const seatsHTML=seats.map(s=>{
    const mark=s.isSindSconf
      ?`<text x="${s.x}" y="${s.y+4}" text-anchor="middle" fill="#fff" style="font-size:11px;font-weight:700;font-family:'DM Mono',monospace">◆</text>`
      :'';
    return `<circle cx="${s.x}" cy="${s.y}" r="${s.r}" fill="${s.color}" stroke="#fff" stroke-width="2"/>${mark}`;
  }).join('');

  const legendY=h-12;
  const minoranzaBadge=sindacoInMinoranza
    ?`<text x="${cx}" y="50" text-anchor="middle" fill="var(--am)" style="font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif">⚠ SINDACO IN MINORANZA</text>`
    :'';

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;height:auto;display:block;margin:0 auto">
    <path d="M ${cx-180} ${cy} A 180 180 0 0 1 ${cx+180} ${cy}" fill="none" stroke="#E8E5DC" stroke-width="1"/>
    ${seatsHTML}
    ${minoranzaBadge}
    <text x="40" y="${legendY}" fill="${colL1}" style="font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif">${listaNomi[0]}: ${isPareggioSindaco?'—':seggiTotali1}</text>
    <text x="${w-40}" y="${legendY}" text-anchor="end" fill="${colL2}" style="font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif">${listaNomi[1]}: ${isPareggioSindaco?'—':seggiTotali2}</text>
    <text x="${cx}" y="${legendY}" text-anchor="middle" fill="var(--tx3)" style="font-size:10px;font-family:'DM Mono',monospace">12 consiglieri · ◆ sindaco sconfitto (di diritto)</text>
  </svg>`;
}

/* Regola genere: 1 pref → libera (M o F); 2 pref → obbligatoriamente 1M + 1F */
function genderErr(prefs,cands){
  if(prefs.length<2)return null;
  const gs=prefs.map(j=>(cands[j]?.genere||'M'));
  const hasM=gs.includes('M'), hasF=gs.includes('F');
  if(!hasM||!hasF){
    return 'Con 2 preferenze devi scegliere 1 uomo e 1 donna';
  }
  return null;
}
function wouldViolate(j,prefs,cands){
  if(prefs.length===0)return false;
  const np=[...prefs,j];
  const gs=np.map(k=>(cands[k]?.genere||'M'));
  const hasM=gs.includes('M'),hasF=gs.includes('F');
  if(np.length===2&&(!hasM||!hasF))return true;
  return false;
}

function totals(d){
  let vt=0,bi=0,nu=0,vc1=0,vc2=0,vl1=0,vl2=0,el=0,vd=0;
  let n0pref1=0,n1pref1=0,n2pref1=0,n0pref2=0,n1pref2=0,n2pref2=0;
  const p1={},p2={};
  const singoli1={},singoli2={};
  const coppieOrd1={},coppieOrd2={},coppieSet1={},coppieSet2={};
  for(let i=1;i<=N;i++){
    const s=d[i]||defSez();
    vt+=num(s.votanti);bi+=num(s.bianche);nu+=num(s.nulle);
    vc1+=num(s.vc1);vc2+=num(s.vc2);
    vl1+=num(s.vl1);vl2+=num(s.vl2);
    el+=EL[i-1];vd+=num(s.vd);
    n0pref1+=num(s.n0pref1);n1pref1+=num(s.n1pref1);n2pref1+=num(s.n2pref1);
    n0pref2+=num(s.n0pref2);n1pref2+=num(s.n1pref2);n2pref2+=num(s.n2pref2);
    for(let j=0;j<12;j++){
      p1[j]=(p1[j]||0)+num(s.p1&&s.p1[j]);
      p2[j]=(p2[j]||0)+num(s.p2&&s.p2[j]);
      singoli1[j]=(singoli1[j]||0)+num(s.singoli1&&s.singoli1[j]);
      singoli2[j]=(singoli2[j]||0)+num(s.singoli2&&s.singoli2[j]);
    }
    for(const k in (s.coppieOrd1||{})){coppieOrd1[k]=(coppieOrd1[k]||0)+num(s.coppieOrd1[k])}
    for(const k in (s.coppieOrd2||{})){coppieOrd2[k]=(coppieOrd2[k]||0)+num(s.coppieOrd2[k])}
    for(const k in (s.coppieSet1||{})){coppieSet1[k]=(coppieSet1[k]||0)+num(s.coppieSet1[k])}
    for(const k in (s.coppieSet2||{})){coppieSet2[k]=(coppieSet2[k]||0)+num(s.coppieSet2[k])}
  }
  const tv=vc1+vc2;
  const tvl=vl1+vl2;
  return{vt,bi,nu,vc1,vc2,vl1,vl2,el,tv,tvl,p1,p2,vd,
    singoli1,singoli2,
    n0pref1,n1pref1,n2pref1,n0pref2,n1pref2,n2pref2,
    coppieOrd1,coppieOrd2,coppieSet1,coppieSet2,
    aff:el>0?vt/el*100:0,
    pc1:tv>0?vc1/tv*100:0,pc2:tv>0?vc2/tv*100:0,
    pl1:tvl>0?vl1/tvl*100:0,pl2:tvl>0?vl2/tvl*100:0};
}

/* ══ BALLOT — 4 STEP ════════════════════════════════════════
   Step 1: tipo (valida/bianca/nulla)
   Step 2: voto sindaco (cand 1 / cand 2 / nessuno)
   Step 3: voto lista (L1 / L2 / nessuna)
   Step 4: preferenze candidati (dalla lista votata allo step 3)
═══════════════════════════════════════════════════════════ */
function showBallot(){
  view='ballot';

}
function backToSez(){
  if(userRole==='rapp'){

}

    <p class="sl" data-n="1">Tipo di scheda</p>

        </button>

      ${showP?`

      `:isVal && d.lista==='nessuna'?`
      <div class="sdiv"></div>
      <div class="no nwa">Senza voto alla lista non è possibile registrare preferenze (sarebbero nulle).</div>
      `:''}
    </div>

    <div style="margin-top:1rem">
      ${canConf
        ?`<button class="btn bp bw blg" onclick="confirmBallot()">Conferma scheda #${schN}</button>`
        :`<button class="btn bw blg" disabled>Seleziona tipo scheda per confermare</button>`}
    </div>
  `;
}

function selTipo(t){
  bData.tipo=t;
  if(t!=='valida'){bData.sindaco=null;bData.lista=null;bData.prefs=[];}
  renBallot();
}
function selSindaco(s){bData.sindaco=s;renBallot();}
function selLista(l){
  bData.lista=l;
  bData.prefs=[]; // reset preferenze al cambio lista
  renBallot();
}
function togPref(j){
  const i=bData.prefs.indexOf(j);
  if(i>=0)bData.prefs.splice(i,1);
  else if(bData.prefs.length<MPREF)bData.prefs.push(j);
  renBallot();
}

async function doSaveBallot(){
  closeModal();
  const d=bData;
  fd.votanti=(fd.votanti||0)+1;
  if(d.tipo==='bianca')fd.bianche=(fd.bianche||0)+1;
  else if(d.tipo==='nulla')fd.nulle=(fd.nulle||0)+1;
  else{
    // Voto sindaco
    if(d.sindaco===1)fd.vc1=(fd.vc1||0)+1;
    else if(d.sindaco===2)fd.vc2=(fd.vc2||0)+1;
    // Voto lista (separato dal sindaco!)
    if(d.lista===1)fd.vl1=(fd.vl1||0)+1;
    else if(d.lista===2)fd.vl2=(fd.vl2||0)+1;
    // Disgiunto
    if((d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista){
      fd.vd=(fd.vd||0)+1;
      if(d.sindaco===1)fd.vd12=(fd.vd12||0)+1;
      else fd.vd21=(fd.vd21||0)+1;
    }
    // Preferenze (dalla lista votata, solo se lista valida)
    if(d.lista===1||d.lista===2){
      const pk=d.lista===1?'p1':'p2';
      if(!fd[pk])fd[pk]={};
      d.prefs.forEach(j=>{fd[pk][j]=(fd[pk][j]||0)+1});
      // Distribuzione preferenze (0/1/2 per lista)
      const distKey=d.lista===1?'n':'n';
      if(d.prefs.length===0){
        if(d.lista===1)fd.n0pref1=(fd.n0pref1||0)+1;
        else fd.n0pref2=(fd.n0pref2||0)+1;
      }else if(d.prefs.length===1){
        if(d.lista===1)fd.n1pref1=(fd.n1pref1||0)+1;
        else fd.n1pref2=(fd.n1pref2||0)+1;
        // Voto SECCO singolo: una sola preferenza
        const singKey=d.lista===1?'singoli1':'singoli2';
        if(!fd[singKey])fd[singKey]={};
        fd[singKey][d.prefs[0]]=(fd[singKey][d.prefs[0]]||0)+1;
      }else if(d.prefs.length===2){
        if(d.lista===1)fd.n2pref1=(fd.n2pref1||0)+1;
        else fd.n2pref2=(fd.n2pref2||0)+1;
        // Accoppiate
        const [a,b]=d.prefs;
        const keyOrd=a+'>'+b;
        const keySet=Math.min(a,b)+'-'+Math.max(a,b);
        const kOrd=d.lista===1?'coppieOrd1':'coppieOrd2';
        const kSet=d.lista===1?'coppieSet1':'coppieSet2';
        if(!fd[kOrd])fd[kOrd]={};
        if(!fd[kSet])fd[kSet]={};
        fd[kOrd][keyOrd]=(fd[kOrd][keyOrd]||0)+1;
        fd[kSet][keySet]=(fd[kSet][keySet]||0)+1;
      }
    }
  }
  // Storico ultime 10 schede
  if(!fd.lastBallots)fd.lastBallots=[];
  fd.lastBallots.push({
    num:fd.votanti,
    ts:new Date().toISOString(),
    data:JSON.parse(JSON.stringify(d))
  });
  if(fd.lastBallots.length>10)fd.lastBallots.shift();

  fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'scheda',sezione:selSez,numScheda:fd.votanti,tipoScheda:d.tipo,sindaco:d.sindaco,lista:d.lista,nPrefs:d.prefs.length,disgiunto:(d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista});

  // Per rappresentanti: rimani in modalità scrutinio, prepara prossima scheda
  if(userRole==='rapp'){
    const isD=(d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista;
    bData={tipo:null,sindaco:null,lista:null,prefs:[]};
    view='ballot';
    renBallot();
    setTimeout(()=>{
      // Toast di conferma in alto
      const toast=document.createElement('div');
      toast.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gn);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:fin .25s';
      toast.textContent=`✓ Scheda #${num(fd.votanti)} salvata${isD?' · disgiunto':''}`;
      document.body.appendChild(toast);
      setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity .3s';setTimeout(()=>toast.remove(),300)},1200);
    },30);
  } else {
    // Coordinatore/Admin: torna a vista riepilogo sezione
    view='sez';renSez();
    setTimeout(()=>{
      const m=$('sez-msg');
      if(m){
        const isD=(d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista;
        m.innerHTML=`<div class="no nok">Scheda #${num(fd.votanti)} salvata sul server${isD?' · voto disgiunto':''}</div>`;
        setTimeout(()=>{if(m)m.innerHTML=''},2800);
      }
    },30);
  }
}

        const kSet=d.lista===1?'coppieSet1':'coppieSet2';
        if(fd[kOrd]&&fd[kOrd][keyOrd]!==undefined)fd[kOrd][keyOrd]=Math.max(0,fd[kOrd][keyOrd]-1);
        if(fd[kSet]&&fd[kSet][keySet]!==undefined)fd[kSet][keySet]=Math.max(0,fd[kSet][keySet]-1);
      }
    }
  }
  fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'undo',sezione:selSez,numScheda:last.num});
  renSez();
}

async function annullaScheda(idx){
  // Solo admin può annullare sempre; rappresentante solo sue sezioni; coordinatore NO
  if(userRole==='coord'){alert('L\'annullamento schede è riservato ad admin e rappresentanti della sezione.');closeModal();return}
  if(userRole==='rapp' && userSez!==selSez){alert('Puoi annullare solo schede della tua sezione.');closeModal();return}
  if(!fd.lastBallots||!fd.lastBallots[idx])return;
  const sch=fd.lastBallots[idx];
  const d=sch.data;
  if(d._annullataEx){closeModal();return}
  if(d.tipo==='nulla'){closeModal();return}

  if(d.tipo==='bianca')fd.bianche=Math.max(0,(fd.bianche||0)-1);
  else{
    if(d.sindaco===1)fd.vc1=Math.max(0,(fd.vc1||0)-1);
    else if(d.sindaco===2)fd.vc2=Math.max(0,(fd.vc2||0)-1);
    if(d.lista===1)fd.vl1=Math.max(0,(fd.vl1||0)-1);
    else if(d.lista===2)fd.vl2=Math.max(0,(fd.vl2||0)-1);
    if((d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista){
      fd.vd=Math.max(0,(fd.vd||0)-1);
      if(d.sindaco===1)fd.vd12=Math.max(0,(fd.vd12||0)-1);
      else fd.vd21=Math.max(0,(fd.vd21||0)-1);
    }
    if(d.lista===1||d.lista===2){
      const pk=d.lista===1?'p1':'p2';
      if(fd[pk])d.prefs.forEach(j=>{if(fd[pk][j]!==undefined)fd[pk][j]=Math.max(0,fd[pk][j]-1)});
      // Sottrai distribuzione preferenze e singoli/coppie
      if(d.prefs.length===0){
        if(d.lista===1)fd.n0pref1=Math.max(0,(fd.n0pref1||0)-1);
        else fd.n0pref2=Math.max(0,(fd.n0pref2||0)-1);
      }else if(d.prefs.length===1){
        if(d.lista===1)fd.n1pref1=Math.max(0,(fd.n1pref1||0)-1);
        else fd.n1pref2=Math.max(0,(fd.n1pref2||0)-1);
        const singKey=d.lista===1?'singoli1':'singoli2';
        if(fd[singKey]&&fd[singKey][d.prefs[0]]!==undefined)fd[singKey][d.prefs[0]]=Math.max(0,fd[singKey][d.prefs[0]]-1);
      }else if(d.prefs.length===2){
        if(d.lista===1)fd.n2pref1=Math.max(0,(fd.n2pref1||0)-1);
        else fd.n2pref2=Math.max(0,(fd.n2pref2||0)-1);
        const [a,b]=d.prefs;
        const keyOrd=a+'>'+b;
        const keySet=Math.min(a,b)+'-'+Math.max(a,b);
        const kOrd=d.lista===1?'coppieOrd1':'coppieOrd2';
        const kSet=d.lista===1?'coppieSet1':'coppieSet2';
        if(fd[kOrd]&&fd[kOrd][keyOrd]!==undefined)fd[kOrd][keyOrd]=Math.max(0,fd[kOrd][keyOrd]-1);
        if(fd[kSet]&&fd[kSet][keySet]!==undefined)fd[kSet][keySet]=Math.max(0,fd[kSet][keySet]-1);
      }
    }
  }
  fd.nulle=(fd.nulle||0)+1;
  fd.lastBallots[idx].data._annullataEx=true;
  fd.lastBallots[idx].annullataTs=new Date().toISOString();
  fd.lastBallots[idx].annullataBy=userRole;
  fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'annulla_ex_post',sezione:selSez,numScheda:sch.num,ruolo:userRole});
  closeModal();renSez();
  setTimeout(()=>{
    const m=$('sez-msg');
    if(m){m.innerHTML=`<div class="no nok">Scheda #${sch.num} annullata (convertita in NULLA)</div>`;setTimeout(()=>{if(m)m.innerHTML=''},3000)}
  },30);
}

function tblRows(d){
  // Calcola massimi per heatmap
  const maxVc=Math.max(1,...Array.from({length:N},(_,i)=>Math.max(num((d[i+1]||defSez()).vc1),num((d[i+1]||defSez()).vc2))));
  const maxVl=Math.max(1,...Array.from({length:N},(_,i)=>Math.max(num((d[i+1]||defSez()).vl1),num((d[i+1]||defSez()).vl2))));
  const heatBg=(v,maxV,idx)=>{
    if(v<=0)return 'transparent';
    const intensity=Math.min(1,v/maxV);
    const alpha=(0.08+intensity*0.40).toFixed(2);
    return idx===0?`rgba(27,82,153,${alpha})`:`rgba(184,64,32,${alpha})`;
  };
  return Array.from({length:N},(_,i)=>{
    const s=d[i+1]||defSez(),el=EL[i],tv=num(s.vc1)+num(s.vc2),tvl=num(s.vl1)+num(s.vl2);
    const af=el>0?(num(s.votanti)/el*100).toFixed(1):'0.0';
    const ps1=tv>0?(num(s.vc1)/tv*100).toFixed(1):'—',ps2=tv>0?(num(s.vc2)/tv*100).toFixed(1):'—';
    const pl1=tvl>0?(num(s.vl1)/tvl*100).toFixed(1):'—',pl2=tvl>0?(num(s.vl2)/tvl*100).toFixed(1):'—';
    const bg=s.done?`<span class="badge bok">Completa</span>`:s.upd?`<span class="badge bwip">${ft(s.upd)}</span>`:`<span class="badge bwt">Attesa</span>`;
    return`<tr><td style="font-weight:600">${i+1}</td><td>${fn(s.votanti)}</td>
      <td style="background:${heatBg(num(s.vc1),maxVc,0)};font-weight:600">${fn(s.vc1)} <small style="color:var(--tx3)">${tv>0?'('+ps1+'%)':''}</small></td>
      <td style="background:${heatBg(num(s.vc2),maxVc,1)};font-weight:600">${fn(s.vc2)} <small style="color:var(--tx3)">${tv>0?'('+ps2+'%)':''}</small></td>
      <td style="background:${heatBg(num(s.vl1),maxVl,0)};font-weight:600">${fn(s.vl1)} <small style="color:var(--tx3)">${tvl>0?'('+pl1+'%)':''}</small></td>
      <td style="background:${heatBg(num(s.vl2),maxVl,1)};font-weight:600">${fn(s.vl2)} <small style="color:var(--tx3)">${tvl>0?'('+pl2+'%)':''}</small></td>
      <td>${af}%</td><td>${num(s.vd)>0?`<span style="color:var(--am)">${fn(s.vd)}</span>`:'—'}</td><td>${bg}</td></tr>`;
  }).join('');
}

/* ══ HELPER GRAFICI: ciambella e torta riutilizzabili ═══════ */
function mkDonutAffluenza(id,votanti,elettori){
  const ctx=$(id);if(!ctx)return null;
  const v=Math.max(0,votanti),e=Math.max(1,elettori),mancanti=Math.max(0,e-v);
  return new Chart(ctx,{
    type:'doughnut',
    data:{datasets:[{data:[v,mancanti],backgroundColor:['#1B5299','#EBE8E2'],borderColor:'#FAFAF7',borderWidth:2,cutout:'72%'}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const lbl=c.dataIndex===0?'Votanti':'Mancanti';return ' '+lbl+': '+fn(c.parsed)+' ('+(c.parsed/e*100).toFixed(1)+'%)'}}}},
      animation:{duration:600}
    }
  });
}
function mkPie(id,values,colors,labels){
  const ctx=$(id);if(!ctx)return null;
  const tot=values.reduce((a,b)=>a+b,0);
  // Se tutti zero, mostra placeholder grigio
  const data=tot===0?[1]:values;
  const cols=tot===0?['#EBE8E2']:colors;
  const lbls=tot===0?['In attesa di dati']:labels;
  return new Chart(ctx,{
    type:'pie',
    data:{labels:lbls,datasets:[{data:data,backgroundColor:cols,borderColor:'#FAFAF7',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{
        enabled:tot>0,
        callbacks:{label:c=>' '+c.label+': '+fn(c.parsed)+' ('+(tot>0?(c.parsed/tot*100).toFixed(1):0)+'%)'}
      }},
      animation:{duration:600}
    }
  });
}
function updDonutAffluenza(ch,votanti,elettori){
  if(!ch)return;
  const v=Math.max(0,votanti),e=Math.max(1,elettori),mancanti=Math.max(0,e-v);
  ch.data.datasets[0].data=[v,mancanti];
  ch.update('none');
}
function updPie(ch,values,colors){
  if(!ch)return;
  const tot=values.reduce((a,b)=>a+b,0);
  ch.data.datasets[0].data=tot===0?[1]:values;
  ch.data.datasets[0].backgroundColor=tot===0?['#EBE8E2']:colors;
  ch.options.plugins.tooltip.enabled=tot>0;
  ch.update('none');
}

    }).join('');

function updPublicDash(){
  if(view!=='public')return;
  const t=totals(allData);
  const done=Object.values(allData).filter(d=>d.done).length;
  const proj=calcolaProiezione();
  const tvS=t.tv,tvL=t.tvl;
  const p1=tvS?num(t.vc1)/tvS*100:0,p2=tvS?num(t.vc2)/tvS*100:0;
  const pl1=tvL?num(t.vl1)/tvL*100:0,pl2=tvL?num(t.vl2)/tvL*100:0;
  const affP=t.el>0?num(t.vt)/t.el*100:0;
  const progP=N>0?done/N*100:0;
  const ldrC=tvS>0?(p1>=p2?PD.CA1:PD.CA2):PD.MU;
  const ldr=tvS>0?(p1>=p2?C1.nome:C2.nome):null;
  const set=(id,v)=>{const e=$(id);if(e)e.textContent=v};
  const sty=(id,p,v)=>{const e=$(id);if(e)e.style[p]=v};
  const inn=(id,v)=>{const e=$(id);if(e)e.innerHTML=v};

  sty('pdpbf','width',progP.toFixed(1)+'%');
  const t1s=$('pd-t1sub');if(t1s)t1s.textContent=`${done}/${N} sez · ${affP>0?affP.toFixed(1):'—'}% affl.`;
  set('pd-aff',affP>0?affP.toFixed(1)+'%':'—');set('pd-aff-sub',fn(t.vt)+'/'+fn(t.el));
  set('pd-tvs',tvS>0?fn(tvS):'—');set('pd-tvs-sub','b.'+fn(t.bi)+' n.'+fn(t.nu));
  set('pd-tvl',tvL>0?fn(tvL):'—');set('pd-tvl-sub','dis. '+fn(t.vd));
  set('pd-sez-cnt',done+'/'+N);
  set('pd-p2',tvS>0?p2.toFixed(1)+'%':'—');set('pd-v2',tvS>0?fn(t.vc2)+' voti sindaco':'In attesa…');sty('pd-bar2','width',p2+'%');
  set('pd-p1',tvS>0?p1.toFixed(1)+'%':'—');set('pd-v1',tvS>0?fn(t.vc1)+' voti sindaco':'In attesa…');sty('pd-bar1','width',p1+'%');
  set('pd-pl2',tvL>0?pl2.toFixed(1)+'%':'—');set('pd-vl2',fn(t.vl2)+' voti lista');sty('pd-lbar2','width',pl2+'%');
  set('pd-pl1',tvL>0?pl1.toFixed(1)+'%':'—');set('pd-vl1',fn(t.vl1)+' voti lista');sty('pd-lbar1','width',pl1+'%');
  set('pd-r2',tvS>0?p2.toFixed(1)+'%':'—');set('pd-r1',tvS>0?p1.toFixed(1)+'%':'—');sty('pd-rb2','width',p2+'%');sty('pd-rb1','width',p1+'%');
  if(ldr){
    set('pd-race-lbl',ldr+' +'+Math.abs(p1-p2).toFixed(1)+'pp · distacco '+fn(Math.abs(num(t.vc1)-num(t.vc2)))+' voti');
    set('pd-delta',fn(Math.abs(num(t.vc1)-num(t.vc2))));set('pd-ldr-badge',ldr+' conduce');
  }
  inn('pd-parl',pdMiniCouncil(proj));
  const rk1=pdRank(0,t),rk2=pdRank(1,t);
  const sg1=proj?proj.seggiLista1Cons:null,sg2=proj?proj.seggiLista2Cons:null;
  inn('pd-table1',pdCrossTable(0,rk1,PD.CA1,sg1));
  inn('pd-table2',pdCrossTable(1,rk2,PD.CA2,sg2));
}


/* ══ RENDER CONTENUTO PROIEZIONE CONSIGLIO ═════════════════ */
function renderProiezioneContent(){
  const proj=calcolaProiezione();
  const {isPareggioSindaco,isPareggioLista,sindacoVincIdx,sindacoPerdIdx,listaVincIdx,sindacoInMinoranza,seggiLista1Cons,seggiLista2Cons}=proj;

  // Soglia consiglieri per lista
  const sogliaLista=(idx)=>{
    if(isPareggioLista)return null;
    return idx===0 ? seggiLista1Cons : seggiLista2Cons;
  };

  const renderClassifica=(classifica,idx)=>{
    const soglia=sogliaLista(idx);
    const colMid=idx===0?'var(--c1m)':'var(--c2m)';
    const colDk=idx===0?'var(--c1t)':'var(--c2t)';
    const colBg=idx===0?'var(--c1l)':'var(--c2l)';
    const bgCol=idx===0?'#1B5299':'#B84020';
    const isSindVinc=!isPareggioSindaco && idx===sindacoVincIdx;
    const isSindPerd=!isPareggioSindaco && idx===sindacoPerdIdx;

    const nomeSind=idx===0?C1.nome:C2.nome;
    let sindHTML='';
    if(isSindVinc){
      sindHTML=`<div style="padding:10px 12px;background:${bgCol};color:#fff;border-radius:var(--rs);margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px">★</span>
        <div style="flex:1">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;opacity:.8">Sindaco eletto</div>
          <div style="font-size:14px;font-weight:700">${nomeSind}</div>
        </div>
        <span class="badge" style="background:rgba(255,255,255,.25);color:#fff">ELETTO</span>
      </div>`;
    }else if(isSindPerd){
      sindHTML=`<div style="padding:10px 12px;background:${colBg};border:1px solid ${bgCol};border-radius:var(--rs);margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px;color:${colMid}">◆</span>
        <div style="flex:1">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${colMid}">Consigliere di diritto (sindaco sconfitto)</div>
          <div style="font-size:14px;font-weight:700;color:${colDk}">${nomeSind}</div>
        </div>
        <span class="badge bok">ELETTO</span>
      </div>`;
    }

    const rows=classifica.map((c,pos)=>{
      const isEletto=soglia!==null && pos<soglia;
      const style=isEletto
        ? `background:${colBg};border:1px solid ${bgCol}40`
        : 'background:var(--sf);opacity:.55';
      const statusBadge=isEletto
        ?`<span class="badge bok" style="font-size:10px">✓ ELETTO</span>`
        :`<span style="font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace">—</span>`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;${style};border-radius:6px;margin-bottom:4px">
        <span style="min-width:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);font-weight:600">${pos+1}</span>
        ${gB(c.genere)}
        <span style="flex:1;font-size:12px;font-weight:${isEletto?'600':'400'};color:${isEletto?colDk:'var(--tx2)'}">${c.nome}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:${isEletto?colMid:'var(--tx3)'}">${fn(c.voti)}</span>
        ${statusBadge}
      </div>`;
    }).join('');

    const seggiLabel=soglia===null?'—':`${soglia} consiglieri${isSindVinc||isSindPerd?' + 1 sindaco':''}`;

    return `
      <div class="card" style="margin:0;padding:14px 16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;color:${colMid}">${listaNomi[idx]}</span>
          <span class="badge" style="background:${colBg};color:${colDk};font-weight:700">${seggiLabel}</span>
        </div>
        ${sindHTML}
        ${rows}
      </div>`;
  };

  if(isPareggioSindaco || isPareggioLista){
    const msg=isPareggioSindaco?'Pareggio tra candidati sindaco':'Pareggio tra le liste';
    $('proj-content').innerHTML=`
      <div class="no nwa" style="margin-bottom:10px;text-align:center;padding:1.5rem">
        <p style="font-size:14px;font-weight:600;margin-bottom:4px">⚖ ${msg}</p>
        <p style="font-size:12px">La proiezione si attiverà appena uno schieramento prevarrà sull'altro</p>
      </div>
    `;
    return;
  }

  const minoranzaAlert=sindacoInMinoranza
    ?`<div class="no nwa" style="margin-bottom:10px;text-align:center"><strong>⚠ Sindaco in minoranza</strong> — Il sindaco vincente (${sindacoVincIdx===0?C1.nome:C2.nome}) appartiene a una lista che ha preso meno voti di lista. Sarà in minoranza in consiglio (${seggiLista1Cons===5?'5':'7'} vs ${seggiLista2Cons===5?'5':'7'} consiglieri).</div>`
    :'';

  $('proj-content').innerHTML=`
    ${minoranzaAlert}
    <div style="margin-bottom:16px">${renderParlamentino(proj)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${renderClassifica(proj.classifica1,0)}
      ${renderClassifica(proj.classifica2,1)}
    </div>
    <p style="font-size:11px;color:var(--tx3);text-align:center;margin-top:10px;font-style:italic">
      ★ Sindaco eletto · ◆ Consigliere di diritto (sindaco sconfitto) · ✓ Eletto per preferenze personali · seggi consiglieri assegnati in base ai voti di LISTA
    </p>
  `;
}

let listDashIdx=null;

function showListDash(idx){
  view='listdash';listDashIdx=idx;killCharts();renListDash();
}

function renListDash(){
  const idx=listDashIdx;
  const listName=listaNomi[idx];
  const cands=CANDS[idx]||[];
  const candNome=idx===0?C1.nome:C2.nome;
  const col=idx===0?'var(--c1)':'var(--c2)';
  const colMid=idx===0?'var(--c1m)':'var(--c2m)';
  const colBg=idx===0?'var(--c1l)':'var(--c2l)';
  const colHex=idx===0?'#1B5299':'#B84020';
  const pk=idx===0?'p1':'p2';

  const t=totals(allData);
  const prefsByCand=idx===0?t.p1:t.p2;

  const enriched=cands.map((c,j)=>{
    const sezionData=Array.from({length:N},(_,i)=>num((allData[i+1]||defSez())[pk]&&(allData[i+1]||defSez())[pk][j]));
    return {
      j, nome:c.nome||('Candidato '+(j+1)), genere:c.genere||'M',
      totale:prefsByCand[j]||0,
      sezioni:sezionData
    };
  });

  const sorted=[...enriched].sort((a,b)=>b.totale-a.totale);
  const totPref=sorted.reduce((sum,c)=>sum+c.totale,0);

  // Heatmap: trova il massimo per calibrare intensità sfondo celle
  const maxSingleSez=Math.max(1,...sorted.flatMap(c=>c.sezioni));

  // Funzione che genera colore di sfondo graduale proporzionale al valore
  const heatBg=(v,maxV)=>{
    if(v<=0)return 'transparent';
    const intensity=Math.min(1,v/maxV);
    // Lerp alpha 0.08 → 0.55 dal min al max
    const alpha=(0.08+intensity*0.47).toFixed(2);
    return idx===0
      ? `rgba(27,82,153,${alpha})`
      : `rgba(184,64,32,${alpha})`;
  };

  // Tabella candidato x sezione con heatmap
  const tblHdr=['Pos','Candidato','Gen','Tot','%',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))];
  const tblRowsHTML=sorted.map((c,pos)=>{
    const pctTot=totPref>0?(c.totale/totPref*100).toFixed(1)+'%':'—';
    const cells=[
      `<td style="font-weight:600;color:var(--tx3);font-family:'DM Mono',monospace">${pos+1}</td>`,
      `<td style="font-weight:500">${c.nome}</td>`,
      `<td>${gB(c.genere)}</td>`,
      `<td style="font-weight:700;color:${col};font-family:'DM Mono',monospace">${fn(c.totale)}</td>`,
      `<td style="color:var(--tx3);font-family:'DM Mono',monospace;font-size:11px">${pctTot}</td>`,
      ...c.sezioni.map(v=>{
        const bg=heatBg(v,maxSingleSez);
        const tc=v>=maxSingleSez*0.6?'#fff':(v>0?(idx===0?'var(--c1t)':'var(--c2t)'):'var(--tx3)');
        return `<td style="font-family:'DM Mono',monospace;background:${bg};color:${tc};font-weight:${v>0?'600':'400'};text-align:center">${v>0?fn(v):'—'}</td>`;
      })
    ];
    return `<tr>${cells.join('')}</tr>`;
  }).join('');

  const sezTotals=Array.from({length:N},(_,i)=>sorted.reduce((sum,c)=>sum+c.sezioni[i],0));
  const totalRow=`<tr style="background:${colBg};font-weight:600">
    <td></td>
    <td style="color:${colMid}">TOTALE</td>
    <td></td>
    <td style="color:${col};font-family:'DM Mono',monospace">${fn(totPref)}</td>
    <td></td>
    ${sezTotals.map(v=>`<td style="color:${colMid};font-family:'DM Mono',monospace;text-align:center">${fn(v)}</td>`).join('')}
  </tr>`;

  // ═══ TOP TICKET ═══
  // Accoppiate ordinate (primo → secondo)
  const coppieOrd=idx===0?t.coppieOrd1:t.coppieOrd2;
  const coppieSet=idx===0?t.coppieSet1:t.coppieSet2;

  const coppieOrdList=Object.entries(coppieOrd||{})
    .map(([k,v])=>{
      const [a,b]=k.split('>').map(n=>parseInt(n));
      return {a,b,voti:num(v),candA:cands[a],candB:cands[b]};
    })
    .filter(x=>x.candA&&x.candB&&x.voti>0)
    .sort((a,b)=>b.voti-a.voti)
    .slice(0,10);

  const coppieSetList=Object.entries(coppieSet||{})
    .map(([k,v])=>{
      const [a,b]=k.split('-').map(n=>parseInt(n));
      return {a,b,voti:num(v),candA:cands[a],candB:cands[b]};
    })
    .filter(x=>x.candA&&x.candB&&x.voti>0)
    .sort((a,b)=>b.voti-a.voti)
    .slice(0,10);

  // Classifica singoli (top 10)
  const singoliList=sorted.slice(0,10).filter(c=>c.totale>0);

  const mkTicketRow=(c,pos,isCouple)=>{
    if(isCouple){
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${colBg};border:1px solid ${idx===0?'#A8CAEA':'#EAB8A8'};border-radius:var(--rs);margin-bottom:6px">
        <span style="min-width:24px;height:24px;border-radius:50%;background:${col};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'DM Mono',monospace">${pos+1}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:${idx===0?'var(--c1t)':'var(--c2t)'};display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span>${c.candA.nome}</span>${gB(c.candA.genere)}
            <span style="color:${colMid}">+</span>
            <span>${c.candB.nome}</span>${gB(c.candB.genere)}
          </div>
        </div>
        <div style="font-size:18px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${fn(c.voti)}</div>
      </div>`;
    }
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${colBg};border:1px solid ${idx===0?'#A8CAEA':'#EAB8A8'};border-radius:var(--rs);margin-bottom:6px">
      <span style="min-width:24px;height:24px;border-radius:50%;background:${col};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'DM Mono',monospace">${pos+1}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:${idx===0?'var(--c1t)':'var(--c2t)'}">${c.nome}</div>
        <div style="font-size:11px;color:${colMid};display:flex;align-items:center;gap:5px">${gB(c.genere)} ${totPref>0?(c.totale/totPref*100).toFixed(1)+'% della lista':''}</div>
      </div>
      <div style="font-size:20px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${fn(c.totale)}</div>
    </div>`;
  };

  const tabSingoli=singoliList.length>0
    ? singoliList.map((c,i)=>mkTicketRow(c,i,false)).join('')
    : `<p style="font-size:12px;color:var(--tx3);padding:10px 0;text-align:center">Nessuna preferenza registrata</p>`;

  const tabOrd=coppieOrdList.length>0
    ? coppieOrdList.map((c,i)=>mkTicketRow(c,i,true)).join('')
    : `<p style="font-size:12px;color:var(--tx3);padding:10px 0;text-align:center">Nessuna accoppiata registrata<br><small>richiede schede con 2 preferenze</small></p>`;

  const tabSet=coppieSetList.length>0
    ? coppieSetList.map((c,i)=>mkTicketRow(c,i,true)).join('')
    : `<p style="font-size:12px;color:var(--tx3);padding:10px 0;text-align:center">Nessuna accoppiata registrata<br><small>richiede schede con 2 preferenze</small></p>`;

  $('root').className='wide';
  $('root').innerHTML=`
    <div class="tb">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn" onclick="goHome()">← Torna</button>
        <div>
          <div class="tb-t" style="color:${colMid}">${listName}</div>
          <div class="tb-s">${candNome} · ${fn(totPref)} preferenze totali · <span id="live-clk"></span></div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="card" style="margin:0">
        <span class="ct" style="color:${colMid}">classifica preferenze</span>
        <canvas id="ch-list" height="260"></canvas>
      </div>
      <div class="card" style="margin:0">
        <div style="display:flex;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;margin-bottom:12px">
          <button class="tk-tab tk-active" data-tab="singoli" onclick="setTicketTab('singoli',${idx})" style="flex:1;padding:8px;border:none;background:${col};color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Singoli</button>
          <button class="tk-tab" data-tab="ord" onclick="setTicketTab('ord',${idx})" style="flex:1;padding:8px;border:none;background:var(--sf);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Accoppiate ordinate</button>
          <button class="tk-tab" data-tab="set" onclick="setTicketTab('set',${idx})" style="flex:1;padding:8px;border:none;background:var(--sf);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Accoppiate</button>
        </div>
        <div id="tk-singoli" style="display:block">${tabSingoli}</div>
        <div id="tk-ord" style="display:none">${tabOrd}</div>
        <div id="tk-set" style="display:none">${tabSet}</div>
        <p id="tk-info" style="font-size:10px;color:var(--tx3);margin-top:8px;line-height:1.4">Classifica dei candidati più votati singolarmente.</p>
      </div>
    </div>

    <div class="card">
      <span class="ct" style="color:${colMid}">dettaglio candidato × sezione · heatmap</span>
      <p style="font-size:11px;color:var(--tx3);margin-bottom:10px">le celle sono colorate in base all'intensità del voto (più scuro = più voti)</p>
      <div style="overflow-x:auto">
        <table class="tbl" style="min-width:700px">
          <thead><tr>${tblHdr.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${tblRowsHTML}${totalRow}</tbody>
        </table>
      </div>
    </div>

    <div class="io" style="margin-top:8px">
      <button class="btn bg" onclick="exportListCSV(${idx})">📊 Esporta CSV lista</button>
      <button class="btn" onclick="showDash()">Dashboard Generale</button>
      <button class="btn" onclick="showListDash(${idx===0?1:0})">Dashboard ${listaNomi[idx===0?1:0]}</button>
    </div>
  `;

  startClock();

  // Chart classifica con data labels e tutti i candidati
  const ctx=$('ch-list');
  if(ctx){
    if(charts.list)charts.list.destroy();
    const chartData=sorted.map(c=>c.totale);
    const maxVal=Math.max(1,...chartData);
    charts.list=new Chart(ctx,{
      type:'bar',
      data:{
        labels:sorted.map(c=>{
          const n=c.nome;
          return n.length>22?n.slice(0,20)+'…':n;
        }),
        datasets:[{data:chartData,backgroundColor:colHex,borderRadius:3,borderSkipped:false}]
      },
      options:{
        indexAxis:'y',responsive:true,
        layout:{padding:{right:30}},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>' '+fn(c.parsed.x)+' preferenze'}}
        },
        scales:{
          x:{display:false,beginAtZero:true,max:maxVal*1.1},
          y:{grid:{display:false},ticks:{font:{size:11},color:'#444'}}
        }
      },
      plugins:[{
        id:'dataLabels',
        afterDatasetsDraw(chart){
          const {ctx,data,scales:{x,y}}=chart;
          ctx.save();
          ctx.font="600 11px 'DM Mono', monospace";
          ctx.fillStyle=colHex;
          ctx.textBaseline='middle';
          data.datasets[0].data.forEach((val,i)=>{
            if(val>0){
              const px=x.getPixelForValue(val);
              const py=y.getPixelForValue(i);
              ctx.fillText(' '+fn(val),px+4,py);
            }
          });
          ctx.restore();
        }
      }]
    });
  }
}

// Switch tab del widget Top Ticket
function setTicketTab(tab,idx){
  const col=idx===0?'#1B5299':'#B84020';
  ['singoli','ord','set'].forEach(t=>{
    const pane=$('tk-'+t);if(pane)pane.style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.tk-tab').forEach(btn=>{
    const isActive=btn.dataset.tab===tab;
    btn.style.background=isActive?col:'var(--sf)';
    btn.style.color=isActive?'#fff':'var(--tx2)';
  });
  const info=$('tk-info');
  if(info){
    if(tab==='singoli')info.textContent='Classifica dei candidati più votati singolarmente.';
    else if(tab==='ord')info.textContent='Accoppiate dove l\'ordine conta: 1ª + 2ª preferenza sulla stessa scheda. Solo schede con 2 preferenze.';
    else info.textContent='Accoppiate senza ordine: coppie di candidati che appaiono insieme, indipendentemente dalla posizione. Solo schede con 2 preferenze.';
  }
}

/* ══ ANALYTICS AVANZATA — solo admin ════════════════════════
   Mostra:
   - Distribuzione 0/1/2 preferenze per lista
   - Voti SECCHI singoli per candidato (= unica preferenza sulla scheda)
   - Voti TOTALI per candidato (qualsiasi posizione)
   - Tutte le accoppiate ordinate (con tabella sezione per sezione + heatmap)
   - Tutte le accoppiate non ordinate (con tabella sezione per sezione + heatmap)
   - Export CSV completo per analisi post-voto
═══════════════════════════════════════════════════════════ */
let analyticsTab='dist'; // dist | secchi | ord | set
let analyticsListaIdx=0;

  if(userRole!=='admin'){alert('Pagina riservata all\'admin.');return}
  view='analytics';killCharts();
  renAnalytics();
}

  const t=totals(allData);
  const idx=analyticsListaIdx;
  const tab=analyticsTab;
  const cands=CANDS[idx]||[];
  const colMid=idx===0?'var(--c1m)':'var(--c2m)';
  const col=idx===0?'var(--c1)':'var(--c2)';
  const colHex=idx===0?'#1B5299':'#B84020';
  const colBg=idx===0?'var(--c1l)':'var(--c2l)';

  $('root').className='wide';
  $('root').innerHTML=`
    <div class="tb">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn" onclick="goHome()">← Torna</button>
        <div><div class="tb-t">🔍 Analytics avanzata</div>
        <div class="tb-s">Solo admin · ${COMUNE} · <span id="live-clk"></span></div></div>
      </div>
    </div>

    <!-- Selettore lista -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <button class="btn ${idx===0?'':''}" style="${idx===0?'background:var(--c1l);color:var(--c1t);border-color:var(--c1)':'background:var(--sf);color:var(--tx2)'};font-weight:600;padding:12px" onclick="setAnalyticsLista(0)">
        ${listaNomi[0]}
      </button>
      <button class="btn ${idx===1?'':''}" style="${idx===1?'background:var(--c2l);color:var(--c2t);border-color:var(--c2)':'background:var(--sf);color:var(--tx2)'};font-weight:600;padding:12px" onclick="setAnalyticsLista(1)">
        ${listaNomi[1]}
      </button>
    </div>

    <!-- Tab analytics -->
    <div style="display:flex;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;margin-bottom:14px;flex-wrap:wrap">
      <button onclick="setAnalyticsTab('dist')" style="flex:1;min-width:120px;padding:10px;border:none;background:${tab==='dist'?col:'var(--sf)'};color:${tab==='dist'?'#fff':'var(--tx2)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">📊 Distribuzione</button>
      <button onclick="setAnalyticsTab('secchi')" style="flex:1;min-width:120px;padding:10px;border:none;background:${tab==='secchi'?col:'var(--sf)'};color:${tab==='secchi'?'#fff':'var(--tx2)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🎯 Voti secchi</button>
      <button onclick="setAnalyticsTab('ord')" style="flex:1;min-width:120px;padding:10px;border:none;background:${tab==='ord'?col:'var(--sf)'};color:${tab==='ord'?'#fff':'var(--tx2)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🔗 Accoppiate ordinate</button>
      <button onclick="setAnalyticsTab('set')" style="flex:1;min-width:120px;padding:10px;border:none;background:${tab==='set'?col:'var(--sf)'};color:${tab==='set'?'#fff':'var(--tx2)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🔁 Accoppiate (insieme)</button>
    </div>

    <div id="analytics-content"></div>

    <div class="io" style="margin-top:14px">
      <button class="btn bg" onclick="exportAnalyticsCSV()">📥 Export CSV completo</button>
      <button class="btn" onclick="goHome()">← Home admin</button>
    </div>
  `;
  startClock();
  renAnalyticsContent();

function setAnalyticsTab(tab){
  analyticsTab=tab;
  if(view==='analytics')renAnalytics();
}
function setAnalyticsLista(idx){
  analyticsListaIdx=idx;
  if(view==='analytics')renAnalytics();
}

function renAnalyticsContent(){
  const t=totals(allData);
  const idx=analyticsListaIdx;
  const tab=analyticsTab;
  const cands=CANDS[idx]||[];
  const colMid=idx===0?'var(--c1m)':'var(--c2m)';
  const col=idx===0?'var(--c1)':'var(--c2)';
  const colHex=idx===0?'#1B5299':'#B84020';
  const colBg=idx===0?'var(--c1l)':'var(--c2l)';
  const pk=idx===0?'p1':'p2';
  const target=$('analytics-content');
  if(!target)return;

  // Calcoli base
  const n0=idx===0?t.n0pref1:t.n0pref2;
  const n1=idx===0?t.n1pref1:t.n1pref2;
  const n2=idx===0?t.n2pref1:t.n2pref2;
  const totSch=n0+n1+n2;
  const singoli=idx===0?t.singoli1:t.singoli2;
  const totVoti=idx===0?t.p1:t.p2;

  // ─── TAB DISTRIBUZIONE ───
  if(tab==='dist'){
    const vlTot=idx===0?t.vl1:t.vl2;
    const pct0=totSch>0?(n0/totSch*100).toFixed(1):'—';
    const pct1=totSch>0?(n1/totSch*100).toFixed(1):'—';
    const pct2=totSch>0?(n2/totSch*100).toFixed(1):'—';
    target.innerHTML=`
      <div class="card">
        <span class="ct" style="color:${colMid}">distribuzione preferenze sulle schede di lista — ${listaNomi[idx]}</span>
        <p style="font-size:12px;color:var(--tx3);margin-bottom:14px">${fn(totSch)} schede di lista totali · ${fn(vlTot)} voti lista (può differire se sindaco != lista)</p>
        <div class="kg" style="grid-template-columns:1fr 1fr 1fr">
          <div class="kpi" style="background:${colBg};border-color:${idx===0?'#A8CAEA':'#EAB8A8'}">
            <div class="kl">0 preferenze</div>
            <div class="kv" style="color:${col}">${fn(n0)}</div>
            <div class="ks">${pct0}% schede</div>
          </div>
          <div class="kpi" style="background:${colBg};border-color:${idx===0?'#A8CAEA':'#EAB8A8'}">
            <div class="kl">1 preferenza (secca)</div>
            <div class="kv" style="color:${col}">${fn(n1)}</div>
            <div class="ks">${pct1}% schede</div>
          </div>
          <div class="kpi" style="background:${colBg};border-color:${idx===0?'#A8CAEA':'#EAB8A8'}">
            <div class="kl">2 preferenze (accoppiate)</div>
            <div class="kv" style="color:${col}">${fn(n2)}</div>
            <div class="ks">${pct2}% schede</div>
          </div>
        </div>
        <p style="font-size:11px;color:var(--tx3);margin-top:12px;line-height:1.5">
          Le preferenze totali sono <strong>${fn(n1+n2*2)}</strong> (dato dalla somma di voti secchi + 2× accoppiate).
          Voti lista che non hanno espresso preferenza: <strong>${fn(n0)}</strong>.
        </p>
      </div>

      <div class="card">
        <span class="ct" style="color:${colMid}">distribuzione preferenze per sezione</span>
        <table class="tbl">
          <thead><tr><th>Sezione</th><th>Voti lista</th><th>0 pref</th><th>1 pref (secca)</th><th>2 pref (accoppiata)</th></tr></thead>
          <tbody>
            ${Array.from({length:N},(_,i)=>{
              const s=allData[i+1]||defSez();
              const vl=idx===0?num(s.vl1):num(s.vl2);
              const _n0=idx===0?num(s.n0pref1):num(s.n0pref2);
              const _n1=idx===0?num(s.n1pref1):num(s.n1pref2);
              const _n2=idx===0?num(s.n2pref1):num(s.n2pref2);
              return `<tr>
                <td style="font-weight:600">${i+1}</td>
                <td style="color:${col};font-weight:600;font-family:'DM Mono',monospace">${fn(vl)}</td>
                <td>${fn(_n0)}</td>
                <td>${fn(_n1)}</td>
                <td>${fn(_n2)}</td>
              </tr>`;
            }).join('')}
            <tr style="background:${colBg};font-weight:600">
              <td>TOT</td>
              <td style="color:${col};font-family:'DM Mono',monospace">${fn(vlTot)}</td>
              <td style="color:${colMid};font-family:'DM Mono',monospace">${fn(n0)}</td>
              <td style="color:${colMid};font-family:'DM Mono',monospace">${fn(n1)}</td>
              <td style="color:${colMid};font-family:'DM Mono',monospace">${fn(n2)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    `;
    return;
  }

  // ─── TAB VOTI SECCHI ───
  if(tab==='secchi'){
    // Per ogni candidato: voti totali, voti secchi, voti in accoppiata
    const dati=cands.map((c,j)=>{
      const totaleCand=num(totVoti[j]);
      const seccoCand=num(singoli[j]);
      const inAccoppiata=totaleCand-seccoCand;
      return {j,nome:c.nome||'C'+(j+1),genere:c.genere||'M',
        totale:totaleCand,secco:seccoCand,accoppiata:inAccoppiata};
    }).sort((a,b)=>b.totale-a.totale);

    const maxTot=Math.max(1,...dati.map(d=>d.totale));
    const heatBg=v=>{
      if(v<=0)return 'transparent';

// Export CSV completo per analisi post-voto
function exportAnalyticsCSV(){
  if(userRole!=='admin'){alert('Solo admin');return}
  const t=totals(allData);
  const q=v=>`"${String(v).replace(/"/g,'""')}"`;
  const rows=[];
  rows.push(['ANALYTICS COMPLETA — '+COMUNE,'Data: '+DATA_EL,'Generato: '+new Date().toLocaleString('it-IT')].join(','));

  for(let li=0;li<2;li++){
    const cands=CANDS[li]||[];
    const pk=li===0?'p1':'p2';
    const sk=li===0?'singoli1':'singoli2';
    const ok=li===0?'coppieOrd1':'coppieOrd2';
    const setk=li===0?'coppieSet1':'coppieSet2';
    const vl=li===0?t.vl1:t.vl2;
    const n0=li===0?t.n0pref1:t.n0pref2;
    const n1=li===0?t.n1pref1:t.n1pref2;
    const n2=li===0?t.n2pref1:t.n2pref2;

    rows.push('');
    rows.push(['===== LISTA: '+listaNomi[li]+' ====='].join(','));
    rows.push('');
    rows.push(['DISTRIBUZIONE PREFERENZE'].join(','));
    rows.push(['Voti lista totali',vl].join(','));
    rows.push(['Schede 0 preferenze',n0].join(','));
    rows.push(['Schede 1 preferenza (secca)',n1].join(','));
    rows.push(['Schede 2 preferenze (accoppiata)',n2].join(','));
    rows.push('');
    rows.push(['VOTI PER CANDIDATO'].join(','));
    rows.push(['Candidato','Genere','Voti totali','Voti secchi','Voti in accoppiata',...Array.from({length:N},(_,i)=>'Sez.'+(i+1)+' tot'),...Array.from({length:N},(_,i)=>'Sez.'+(i+1)+' secchi')].join(','));
    for(let j=0;j<12;j++){
      const c=cands[j]||{nome:'Cand'+(j+1),genere:'M'};
      const tot=num(t[pk][j]);
      const sec=num((li===0?t.singoli1:t.singoli2)[j]);
      const sezTot=Array.from({length:N},(_,i)=>{const s=allData[i+1]||defSez();return num(s[pk]&&s[pk][j])});
      const sezSec=Array.from({length:N},(_,i)=>{const s=allData[i+1]||defSez();return num(s[sk]&&s[sk][j])});
      rows.push([q(c.nome),c.genere,tot,sec,tot-sec,...sezTot,...sezSec].join(','));
    }
    rows.push('');
    rows.push(['ACCOPPIATE ORDINATE (1ª pref + 2ª pref)'].join(','));
    rows.push(['1ª pref','2ª pref','Voti totali',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))].join(','));
    const ord=Object.entries(t[ok]||{}).map(([k,v])=>{const[a,b]=k.split('>').map(n=>parseInt(n));return{a,b,key:k,v:num(v)}}).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
    ord.forEach(x=>{
      const cA=cands[x.a],cB=cands[x.b];
      if(!cA||!cB)return;
      const sez=Array.from({length:N},(_,i)=>{const s=allData[i+1]||defSez();return num(s[ok]&&s[ok][x.key])});
      rows.push([q(cA.nome),q(cB.nome),x.v,...sez].join(','));
    });
    rows.push('');
    rows.push(['ACCOPPIATE NON ORDINATE'].join(','));
    rows.push(['Candidato A','Candidato B','Voti totali',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))].join(','));
    const sett=Object.entries(t[setk]||{}).map(([k,v])=>{const[a,b]=k.split('-').map(n=>parseInt(n));return{a,b,key:k,v:num(v)}}).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
    sett.forEach(x=>{
      const cA=cands[x.a],cB=cands[x.b];
      if(!cA||!cB)return;
      const sez=Array.from({length:N},(_,i)=>{const s=allData[i+1]||defSez();return num(s[setk]&&s[setk][x.key])});
      rows.push([q(cA.nome),q(cB.nome),x.v,...sez].join(','));
    });
  }

  const csv='\uFEFF'+rows.join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='analytics_'+COMUNE.toLowerCase()+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  fbLogEvent({tipo:'export_analytics_csv',ruolo:userRole});
}

  for (let i = 0; i < count; i++) {
    // Trend: 55% Traina (v2), 45% Mangiapane (v1)
    const v2 = Math.random() > 0.45 ? 1 : 0;
    const v1 = v2 === 1 ? 0 : 1;

    if (typeof window.doSaveBallot === 'function') {
      await window.doSaveBallot(v1, v2, 0, []); 
      added++;
      // Un piccolo respiro per evitare di bloccare il browser
      if (i % 10 === 0) await new Promise(r => setTimeout(r, 50));
    }
  }

  alert(`Operazione completata! ${added} schede aggiunte alla sezione ${selSez}.`);
  if (typeof window.goHome === 'function') window.goHome();
};
