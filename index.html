.wide{max-width:1020px!important}
.tb{display:flex;align-items:center;justify-content:space-between;padding:1.125rem 0 .875rem;border-bottom:1px solid var(--bd);margin-bottom:1.25rem;position:sticky;top:0;background:#F5F3EE;z-index:10}

@media(max-width:480px){.kg{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}.cpg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}}

<!-- FIREBASE SDK (modulare v10) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot, collection,
  enableIndexedDbPersistence, serverTimestamp, addDoc, query, orderBy, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(window.firebaseConfig);
const db  = getFirestore(app);

// Persistenza offline: se il wifi cade, continua a salvare in locale e sincronizza quando torna
try {
  await enableIndexedDbPersistence(db).catch(() => {});
} catch(e) {}

// Espone Firebase globalmente per il resto dell'app
window.fb = { db, doc, setDoc, getDoc, onSnapshot, collection, serverTimestamp, addDoc, query, orderBy, limit };
window.fbReady = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

<script>
// Espone firebaseConfig allo script module
window.firebaseConfig = firebaseConfig;

/* ══ STATO ═════════════════════════════════════════════════ */
let view='home', userRole=null, userSez=null, selSez=null;
let allData={}, fd={}, bData={tipo:null,sindaco:null,lista:null,prefs:[]};
let lastBallot=null, charts={}, timerC=null, clockI=null;
let selRoleVal='coord', selSezLogin=null;
let CANDS=[], listaNomi=[C1.lista, C2.lista];
let isOnline=navigator.onLine, fbReady=false;
let unsubSez=null, unsubCfg=null;

/* ══ FIREBASE WRAPPER ══════════════════════════════════════ */
window.addEventListener('fb-ready', ()=>{fbReady=true;onFbReady()});
if(window.fbReady)fbReady=true;
window.addEventListener('online', ()=>{isOnline=true;updateConnUI()});
window.addEventListener('offline',()=>{isOnline=false;updateConnUI()});

function updateConnUI(){
  const el=document.querySelector('.conn-indicator');
  if(el){el.className='conn-indicator conn '+(isOnline?'':'off');el.innerHTML=(isOnline?'<span class="asdot"></span> online':'<span class="asdot off"></span> offline')}
}

async function fbSaveSez(i,d){
  if(!fbReady)return;
  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db,'sezioni',String(i)),{...d,_token:FB_TOKEN,_updatedAt:new Date().toISOString()});
  }catch(e){console.error('FB save err',e)}
}
async function fbSaveCfg(){
  if(!fbReady)return;
  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db,'config','main'),{
      cands:CANDS,liste:listaNomi,_token:FB_TOKEN,_updatedAt:new Date().toISOString()
    });
  }catch(e){console.error('FB cfg err',e)}
}
async function fbLogEvent(evt){
  if(!fbReady)return;
  try{
    await window.fb.addDoc(window.fb.collection(window.fb.db,'eventi'),{
      ...evt, _token:FB_TOKEN, ts:new Date().toISOString(), ua:navigator.userAgent.slice(0,50)
    });
  }catch(e){}
}

function onFbReady(){
  // All'avvio: listener in tempo reale sulle sezioni + configurazione
  try{
    window.fb.onSnapshot(window.fb.collection(window.fb.db,'sezioni'), snap=>{
      const fresh={};
      snap.forEach(doc=>{fresh[doc.id]={...defSez(),...doc.data()}});
      for(let i=1;i<=N;i++){allData[i]=fresh[String(i)]||defSez()}
      cacheSave();
      // Aggiorna la UI se siamo in una vista che mostra i dati
      if(view==='home')showHome();
      else if(view==='dash')updDash();
      else if(view==='public')updPublicDash();
      else if(view==='listdash')renListDash();
      else if(view==='sez' && String(selSez) in fresh){
        fd={...defSez(),...fresh[String(selSez)]};
        renSez();
      }
    });
    window.fb.onSnapshot(window.fb.doc(window.fb.db,'config','main'), snap=>{
      if(snap.exists()){
        const data=snap.data();
        if(data.cands && Array.isArray(data.cands) && data.cands.length===2){
          CANDS=data.cands.map(list=>list.map(c=>typeof c==='string'?{nome:c,genere:'M'}:{nome:c.nome||'',genere:c.genere||'M'}));
        }
        if(data.liste && Array.isArray(data.liste) && data.liste.length===2){
          listaNomi=data.liste;
        }
        cacheSave();
        // Refresh UI se in una vista dove si vedono nomi/candidati
        if(view==='home')showHome();
        else if(view==='dash')renDash();
        else if(view==='public')showPublicDash();
        else if(view==='listdash')renListDash();
        else if(view==='sez')renSez();
        else if(view==='ballot')renBallot();
        else if(view==='admin')showAdmin();
      }
    });
  }catch(e){console.error('FB listen err',e)}
  const s=$('pw-fb-status');if(s){s.innerHTML='<span style="color:var(--gn)">● Connesso al server</span>'}
}

/* ══ BACKUP AUTOMATICI (ogni 2 minuti) ═════════════════════
   Tiene le ultime 30 versioni del database in localStorage
   Il coordinatore può ripristinare l'ultimo backup in caso di sabotaggio
═══════════════════════════════════════════════════════════ */
const BK_KEY='cam5_backups';
const BK_MAX=30;        // massimo 30 backup storici (= 1 ora di copertura)
const BK_INTERVAL=2*60*1000;  // 2 minuti
let bkTimer=null;

function loadBackups(){
  try{const r=localStorage.getItem(BK_KEY);if(r)return JSON.parse(r)}catch(e){}
  return [];
}
function saveBackups(list){
  try{localStorage.setItem(BK_KEY,JSON.stringify(list))}catch(e){}
}
function makeBackup(reason='auto'){
  // Crea snapshot dei dati correnti
  const snap={
    ts:new Date().toISOString(),
    reason, // 'auto', 'manual', 'pre-reset'
    allData:JSON.parse(JSON.stringify(allData)),
    CANDS:JSON.parse(JSON.stringify(CANDS)),
    listaNomi:JSON.parse(JSON.stringify(listaNomi))
  };
  const list=loadBackups();
  list.unshift(snap);
  // Tieni solo BK_MAX backup
  if(list.length>BK_MAX)list.length=BK_MAX;
  saveBackups(list);
  return snap;
}
function startBackupTimer(){
  // Solo admin e coordinatore fanno backup automatici
  if(userRole!=='admin'&&userRole!=='coord')return;
  clearInterval(bkTimer);
  setTimeout(()=>{makeBackup('auto')},10000);
  bkTimer=setInterval(()=>{makeBackup('auto')},BK_INTERVAL);
}
async function restoreBackup(bkIndex){
  const list=loadBackups();
  const bk=list[bkIndex];
  if(!bk){alert('Backup non trovato');return}
  if(!confirm(`Ripristinare il backup del ${new Date(bk.ts).toLocaleTimeString('it-IT')}? I dati attuali verranno sovrascritti su TUTTI i dispositivi.`))return;
  // Backup di sicurezza prima di ripristinare (per undo-dell-undo)
  makeBackup('pre-restore');
  // Ripristino: scrivi tutto su Firebase
  for(let i=1;i<=N;i++){
    const sez=bk.allData[i]||defSez();
    await fbSaveSez(i,sez);
  }
  if(bk.CANDS)CANDS=bk.CANDS;
  if(bk.listaNomi)listaNomi=bk.listaNomi;
  await fbSaveCfg();
  fbLogEvent({tipo:'restore_backup',ts:bk.ts});
  alert('Backup ripristinato correttamente.');
  goHome();
}
function downloadBackup(bkIndex){
  const list=loadBackups();
  const bk=list[bkIndex];
  if(!bk)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(bk,null,2)],{type:'application/json'}));
  a.download='backup_'+COMUNE.toLowerCase()+'_'+bk.ts.slice(0,19).replace(/[:.]/g,'-')+'.json';
  a.click();
}
function deleteBackup(bkIndex){
  if(!confirm('Cancellare questo backup dalla lista locale?'))return;
  const list=loadBackups();
  list.splice(bkIndex,1);
  saveBackups(list);
  showBackups();
}

  $('root').className='';

    <div class="tb">

        <button class="btn" onclick="goHome()">← Torna</button>

      </p>
    </div>
    ${list.length===0
      ?'<div class="card"><p style="font-size:13px;color:var(--tx3);text-align:center;padding:1rem">Nessun backup ancora. Il primo viene creato automaticamente dopo 10 secondi dall\'accesso.</p></div>'

/* Estrae etichetta breve per grafici: "Cognome" se unico, "Cognome N." se duplicato
   I cognomi composti (Lo Scrudato, La Mendola, De Maria, Mangiapane Maria) vengono gestiti:
   prendiamo tutte le parole finché non iniziamo a vedere il nome.
   Strategia semplice: "Cognome" = tutto tranne l'ultima parola che è il nome.
   Se poi ci sono doppi, aggiungiamo l'iniziale del nome. */
function extractCognome(full){
  if(!full)return '';
  const parts=full.trim().split(/\s+/);
  if(parts.length===1)return parts[0];
  // Cognome = tutte le parole tranne l'ultima
  return parts.slice(0,-1).join(' ');
}
function extractNome(full){
  if(!full)return '';
  const parts=full.trim().split(/\s+/);
  if(parts.length===1)return '';
  return parts[parts.length-1];
}
function buildShortLabels(candList){
  // Ritorna array di label brevi: "Cognome" o "Cognome I." se duplicato
  const cogs=candList.map(c=>extractCognome(c.nome||''));
  const counts={};
  cogs.forEach(c=>{counts[c]=(counts[c]||0)+1});
  return candList.map((c,i)=>{
    const cog=cogs[i];
    if(counts[cog]>1){
      const nome=extractNome(c.nome||'');
      return cog+(nome?' '+nome[0]+'.':'');
    }
    return cog;
  });
}

/* ══ PROIEZIONE CONSIGLIO COMUNALE ══════════════════════════
   Regola Cammarata (comune <15k):
   - SINDACO eletto = max(vc1, vc2)
   - LISTA vincente = max(vl1, vl2) → prende 8 consiglieri
   - LISTA perdente = altra → prende 3 consiglieri + sindaco sconfitto di diritto
   
   CASO "sindaco in minoranza": se sindaco vince ma sua lista perde:
   - Lista del sindaco vincente: 5 consiglieri (lista in minoranza)
   - Lista perdente del sindaco ma vincente come lista: 7 consiglieri
   (totale resta 12 consiglieri + sindaco vincente + sindaco sconfitto)
═══════════════════════════════════════════════════════════ */
function calcolaProiezione(){
  const t=totals(allData);

  // Vincitore sindaco (basato su vc1 vs vc2)
  let sindacoVincIdx, sindacoPerdIdx;
  if(t.vc1>t.vc2){sindacoVincIdx=0;sindacoPerdIdx=1}
  else if(t.vc2>t.vc1){sindacoVincIdx=1;sindacoPerdIdx=0}
  else{sindacoVincIdx=null;sindacoPerdIdx=null}

  // Vincitore lista (basato su vl1 vs vl2)
  let listaVincIdx, listaPerdIdx;
  if(t.vl1>t.vl2){listaVincIdx=0;listaPerdIdx=1}
  else if(t.vl2>t.vl1){listaVincIdx=1;listaPerdIdx=0}
  else{listaVincIdx=null;listaPerdIdx=null}

  const isPareggioSindaco = sindacoVincIdx===null;
  const isPareggioLista = listaVincIdx===null;
  // Caso sindaco in minoranza: sindaco vincente di una lista, ma l'altra lista ha più voti lista
  const sindacoInMinoranza = !isPareggioSindaco && !isPareggioLista && (sindacoVincIdx!==listaVincIdx);

  // Calcolo seggi per lista (escluso sindaco)
  let seggiLista1Cons, seggiLista2Cons;
  if(isPareggioSindaco || isPareggioLista){
    seggiLista1Cons=0; seggiLista2Cons=0;
  } else if(!sindacoInMinoranza){
    // Caso normale: sindaco e lista coincidono
    if(sindacoVincIdx===0){seggiLista1Cons=8;seggiLista2Cons=3}
    else{seggiLista1Cons=3;seggiLista2Cons=8}
  } else {
    // Caso sindaco in minoranza: lista del sindaco vincente prende 5, lista vincente 7
    if(sindacoVincIdx===0){seggiLista1Cons=5;seggiLista2Cons=7}
    else{seggiLista1Cons=7;seggiLista2Cons=5}
  }

  const mkClassifica=(idx)=>{
    return (CANDS[idx]||[]).map((c,j)=>({
      j, nome:c.nome||('Candidato '+(j+1)),
      genere:c.genere||'M',
      voti:(idx===0?t.p1[j]:t.p2[j])||0
    })).sort((a,b)=>b.voti-a.voti);
  };

  return {
    totals:t,
    sindacoVincIdx, sindacoPerdIdx,
    listaVincIdx, listaPerdIdx,
    isPareggioSindaco, isPareggioLista,
    sindacoInMinoranza,
    classifica1: mkClassifica(0),
    classifica2: mkClassifica(1),
    seggiLista1Cons, seggiLista2Cons,
    // Totale seggi lista (consiglieri + eventuale sindaco eletto + eventuale sindaco di diritto)
    seggiTotali1: seggiLista1Cons + (sindacoVincIdx===0?1:0) + (sindacoPerdIdx===0?1:0),
    seggiTotali2: seggiLista2Cons + (sindacoVincIdx===1?1:0) + (sindacoPerdIdx===1?1:0)
  };
}

/* Genera SVG del parlamentino a emiciclo con 13 sedili (1 sindaco + 12 consiglieri) */
function renderParlamentino(proj){
  const {sindacoVincIdx,seggiLista1Cons,seggiLista2Cons,isPareggioSindaco,isPareggioLista,sindacoInMinoranza,seggiTotali1,seggiTotali2}=proj;
  const w=600, h=280;
  const cx=w/2, cy=230;

  const colL1='#1B5299', colL2='#B84020', colEmpty='#D4D0C8';
  const seats=[];

  // Sindaco al centro in alto
  const sindacoColor=isPareggioSindaco?colEmpty:(sindacoVincIdx===0?colL1:colL2);
  seats.push({x:cx,y:70,r:22,color:sindacoColor,isSindaco:true});

  // 12 consiglieri in emiciclo (file interna 6 + esterna 6)
  const r1=115, r2=160;
  const angleSpan=Math.PI;
  const startAngle=Math.PI;
  for(let i=0;i<6;i++){
    const a=startAngle + (i/5)*angleSpan*0.55 + angleSpan*0.22;
    seats.push({x:cx+Math.cos(a)*r1,y:cy+Math.sin(a)*r1,r:16,row:'inner'});
  }
  for(let i=0;i<6;i++){
    const a=startAngle + (i/5)*angleSpan*0.9 + angleSpan*0.05;
    seats.push({x:cx+Math.cos(a)*r2,y:cy+Math.sin(a)*r2,r:16,row:'outer'});
  }

  // Colorazione: lista 1 da sinistra (seggiLista1Cons), lista 2 da destra (seggiLista2Cons)
  for(let i=1;i<seats.length;i++){
    const pos=i-1; // 0..11
    if(pos<seggiLista1Cons){
      seats[i].color=colL1;
    } else if(pos>=12-seggiLista2Cons){
      seats[i].color=colL2;
    } else {
      seats[i].color=colEmpty;
    }
  }

  const seatsHTML=seats.map(s=>{
    const star=s.isSindaco?`<text x="${s.x}" y="${s.y+5}" text-anchor="middle" fill="#fff" style="font-size:14px;font-weight:600;font-family:'DM Mono',monospace">★</text>`:'';
    return `<circle cx="${s.x}" cy="${s.y}" r="${s.r}" fill="${s.color}" stroke="#fff" stroke-width="2"/>${star}`;
  }).join('');

  const legendY=h-15;
  const minoranzaBadge=sindacoInMinoranza
    ?`<text x="${cx}" y="115" text-anchor="middle" fill="var(--am)" style="font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif">⚠ SINDACO IN MINORANZA</text>`
    :'';

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;height:auto;display:block;margin:0 auto">
    <path d="M ${cx-180} ${cy} A 180 180 0 0 1 ${cx+180} ${cy}" fill="none" stroke="#E8E5DC" stroke-width="1"/>
    ${seatsHTML}
    ${minoranzaBadge}
    <text x="40" y="${legendY}" fill="${colL1}" style="font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif">${listaNomi[0]}: ${seggiTotali1}</text>
    <text x="${w-40}" y="${legendY}" text-anchor="end" fill="${colL2}" style="font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif">${listaNomi[1]}: ${seggiTotali2}</text>
    <text x="${cx}" y="${legendY}" text-anchor="middle" fill="var(--tx3)" style="font-size:10px;font-family:'DM Mono',monospace">Consiglio Comunale ${COMUNE}</text>
  </svg>`;
}

/* Regola genere: 1 pref → libera (M o F); 2 pref → obbligatoriamente 1M + 1F */
function genderErr(prefs,cands){
  if(prefs.length<2)return null;
  const gs=prefs.map(j=>(cands[j]?.genere||'M'));
  const hasM=gs.includes('M'), hasF=gs.includes('F');
  if(!hasM||!hasF){
    return 'Con 2 preferenze devi scegliere 1 uomo e 1 donna';
  }
  return null;
}
function wouldViolate(j,prefs,cands){
  if(prefs.length===0)return false;
  const np=[...prefs,j];
  const gs=np.map(k=>(cands[k]?.genere||'M'));
  const hasM=gs.includes('M'),hasF=gs.includes('F');
  if(np.length===2&&(!hasM||!hasF))return true;
  return false;
}

function totals(d){
  let vt=0,bi=0,nu=0,vc1=0,vc2=0,vl1=0,vl2=0,el=0,vd=0;
  const p1={},p2={};
  const coppieOrd1={},coppieOrd2={},coppieSet1={},coppieSet2={};
  for(let i=1;i<=N;i++){
    const s=d[i]||defSez();
    vt+=num(s.votanti);bi+=num(s.bianche);nu+=num(s.nulle);
    vc1+=num(s.vc1);vc2+=num(s.vc2);
    vl1+=num(s.vl1);vl2+=num(s.vl2);
    el+=EL[i-1];vd+=num(s.vd);
    for(let j=0;j<12;j++){
      p1[j]=(p1[j]||0)+num(s.p1&&s.p1[j]);
      p2[j]=(p2[j]||0)+num(s.p2&&s.p2[j]);
    }
    // Aggrega coppie ordinate e non ordinate
    for(const k in (s.coppieOrd1||{})){coppieOrd1[k]=(coppieOrd1[k]||0)+num(s.coppieOrd1[k])}
    for(const k in (s.coppieOrd2||{})){coppieOrd2[k]=(coppieOrd2[k]||0)+num(s.coppieOrd2[k])}
    for(const k in (s.coppieSet1||{})){coppieSet1[k]=(coppieSet1[k]||0)+num(s.coppieSet1[k])}
    for(const k in (s.coppieSet2||{})){coppieSet2[k]=(coppieSet2[k]||0)+num(s.coppieSet2[k])}
  }
  const tv=vc1+vc2;
  const tvl=vl1+vl2;
  return{vt,bi,nu,vc1,vc2,vl1,vl2,el,tv,tvl,p1,p2,vd,
    coppieOrd1,coppieOrd2,coppieSet1,coppieSet2,
    aff:el>0?vt/el*100:0,
    pc1:tv>0?vc1/tv*100:0,pc2:tv>0?vc2/tv*100:0,
    pl1:tvl>0?vl1/tvl*100:0,pl2:tvl>0?vl2/tvl*100:0};
}

function checkPw(){

    if(pw!==PIN_COORD){err.textContent='PIN errato';return}
    userRole='coord';userSez=null;
  }else{
    if(!selSezLogin){err.textContent='Seleziona la tua sezione';return}
    if(pw!==PIN_RAPP){err.textContent='PIN errato';return}
    userRole='rapp';userSez=selSezLogin;
  }
  fbLogEvent({tipo:'login',ruolo:userRole,sezione:userSez});
  $('pw-screen').style.display='none';$('app-root').style.display='block';
  startBackupTimer();
  showHome();
}

async function toggleDone(){

/* ══ BALLOT — 4 STEP ════════════════════════════════════════
   Step 1: tipo (valida/bianca/nulla)
   Step 2: voto sindaco (cand 1 / cand 2 / nessuno)
   Step 3: voto lista (L1 / L2 / nessuna)
   Step 4: preferenze candidati (dalla lista votata allo step 3)
═══════════════════════════════════════════════════════════ */
function showBallot(){
  view='ballot';
  bData={tipo:null,sindaco:null,lista:null,prefs:[]};
  renBallot();
}
function backToSez(){view='sez';renSez()}

function renBallot(){
  const d=bData;
  // La lista di riferimento per preferenze = lista votata allo step 3
  const ci=d.lista===1?0:d.lista===2?1:null;
  const showS=d.tipo==='valida';
  const showL=showS && d.sindaco!==null;
  const showP=showL && (d.lista===1||d.lista===2);
  const isDis=d.tipo==='valida' && (d.sindaco===1||d.sindaco===2) && (d.lista===1||d.lista===2) && d.sindaco!==d.lista;
  const gErr=showP&&ci!==null?genderErr(d.prefs,CANDS[ci]):null;
  const canConf=d.tipo==='bianca'||d.tipo==='nulla'||(showS && d.sindaco!==null && d.lista!==null && !gErr);
  const schN=num(fd.votanti)+1;

  let prefHTML='';
  if(showP&&ci!==null){
    prefHTML=(CANDS[ci]||[]).map((c,j)=>{
      const isSel=d.prefs.includes(j);
      const isDis2=!isSel&&(d.prefs.length>=MPREF||wouldViolate(j,d.prefs,CANDS[ci]));
      const rank=isSel?d.prefs.indexOf(j)+1:null;
      const g=c?.genere||'M';
      return`<button class="pb${isSel?(ci===0?' p1':' p2'):''}"
        onclick="togPref(${j})"${isDis2?' disabled':''}>
        ${isSel?`<span class="pnum ${ci===0?'n1':'n2'}">${rank}</span>`:'<span style="min-width:6px;flex-shrink:0"></span>'}
        <span style="flex:1">${c.nome||('Candidato '+(j+1))}</span>
        ${gB(g)}
      </button>`;
    }).join('');
  }

  $('root').innerHTML=`
    <div class="tb">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn" onclick="backToSez()">← Indietro</button>
        <div><div class="tb-t">Sezione ${selSez} — Scheda #${schN}</div>
        <div class="tb-s">Inserimento voto</div></div>
      </div>
      ${isDis?'<span class="badge bdis">DISGIUNTO</span>':''}
    </div>

    <p class="sl" data-n="1">Tipo di scheda</p>
    <div class="tg">
      <button class="tb2${d.tipo==='valida'?' sv':''}" onclick="selTipo('valida')"><div class="ti">✓</div><div class="tl">Valida</div></button>
      <button class="tb2${d.tipo==='bianca'?' sb':''}" onclick="selTipo('bianca')"><div class="ti">○</div><div class="tl">Bianca</div></button>
      <button class="tb2${d.tipo==='nulla'?' sn2':''}" onclick="selTipo('nulla')"><div class="ti">✕</div><div class="tl">Nulla</div></button>
    </div>

    ${showS?`
    <div class="sdiv"></div>
    <p class="sl" data-n="2">Voto al candidato sindaco</p>
    <div class="cpg">
      <button class="cpb cc1${d.sindaco===1?' sel':''}" onclick="selSindaco(1)">
        <div class="cpl">${listaNomi[0]}</div><div class="cpn">${C1.nome}</div>
      </button>
      <button class="cpb cc2${d.sindaco===2?' sel':''}" onclick="selSindaco(2)">
        <div class="cpl">${listaNomi[1]}</div><div class="cpn">${C2.nome}</div>
      </button>
    </div>
    <button class="btn${d.sindaco==='nessuno'?' bp':''}" style="width:100%;padding:9px;font-size:12px;margin-bottom:1rem" onclick="selSindaco('nessuno')">
      Nessun voto al sindaco
    </button>`:''}

    ${showL?`
    <div class="sdiv"></div>
    <p class="sl" data-n="3">Voto alla lista (simbolo barrato)
      <span style="text-transform:none;letter-spacing:0;font-size:11px;color:var(--tx3);font-weight:400">— le preferenze saranno di questa lista</span>
    </p>
    <div class="cpg">
      <button class="cpb cc1${d.lista===1?' sel':''}" onclick="selLista(1)">
        <div class="cpl">Voto lista</div><div class="cpn">${listaNomi[0]}</div>
      </button>
      <button class="cpb cc2${d.lista===2?' sel':''}" onclick="selLista(2)">
        <div class="cpl">Voto lista</div><div class="cpn">${listaNomi[1]}</div>
      </button>
    </div>
    <button class="btn${d.lista==='nessuna'?' bp':''}" style="width:100%;padding:9px;font-size:12px;margin-bottom:1rem" onclick="selLista('nessuna')">
      Nessun simbolo lista barrato
    </button>
    ${isDis?'<div class="no nwa" style="margin-top:-6px;margin-bottom:10px">Voto disgiunto: sindaco e lista di schieramenti diversi</div>':''}`:''}

    ${showP?`
    <div class="sdiv"></div>
    <p class="sl" data-n="4">Preferenze consiglieri · ${listaNomi[ci]}
      <span style="text-transform:none;letter-spacing:0;font-size:11px;color:var(--tx3);font-weight:400">opzionali · ${d.prefs.length}/${MPREF}</span>
    </p>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:6px">
      ${gB('M')} uomo &nbsp; ${gB('F')} donna &nbsp;·&nbsp;
      massimo 2 preferenze · se 2 → obbligatorio 1 uomo + 1 donna
    </div>
    <div class="pg">${prefHTML}</div>
    ${gErr?`<div class="no ner">${gErr}</div>`:''}
    ${d.prefs.length>=2&&!gErr?`<div class="no nok">Genere valido ✓</div>`:''}`:''}

    ${showL && d.lista==='nessuna'?`
    <div class="sdiv"></div>
    <div class="no nwa">Senza voto alla lista non è possibile registrare preferenze consiglieri (sarebbero nulle). Conferma pure se la scheda non riporta simbolo lista barrato.</div>
    `:''}

    <div style="margin-top:${showP?'4px':'1rem'}">
      ${canConf
        ?`<button class="btn bp bw blg" onclick="confirmBallot()">Conferma scheda #${schN}</button>`
        :`<button class="btn bw blg" disabled>Completa gli step richiesti</button>`}
    </div>
  `;
}

function selTipo(t){
  bData.tipo=t;
  if(t!=='valida'){bData.sindaco=null;bData.lista=null;bData.prefs=[];}
  renBallot();
}
function selSindaco(s){bData.sindaco=s;renBallot();}
function selLista(l){
  bData.lista=l;
  bData.prefs=[]; // reset preferenze al cambio lista
  renBallot();
}
function togPref(j){
  const i=bData.prefs.indexOf(j);
  if(i>=0)bData.prefs.splice(i,1);
  else if(bData.prefs.length<MPREF)bData.prefs.push(j);
  renBallot();
}

async function confirmBallot(){
  const d=bData;
  const schN=num(fd.votanti)+1;
  const ci=d.lista===1?0:d.lista===2?1:null;
  const isDisgiunto=d.tipo==='valida' && (d.sindaco===1||d.sindaco===2) && (d.lista===1||d.lista===2) && d.sindaco!==d.lista;

  let riepilogoHTML='';
  if(d.tipo==='bianca'){
    riepilogoHTML=`<div style="text-align:center;padding:1rem 0">

        <p style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${col};margin-bottom:2px;font-weight:600">Sindaco · ${lista}</p>
        <p style="font-size:14px;font-weight:600;color:${col}">${nome}</p>
      </div>`;
    }else{
      sindBox=`<div style="background:var(--sf2);padding:10px 12px;border-radius:var(--rs);margin-bottom:8px">
        <p style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:2px;font-weight:600">Sindaco</p>
        <p style="font-size:13px;color:var(--tx3)">Nessun voto</p>
      </div>`;
    }
    // Box lista + preferenze combinate
    let listaBox='';
    if(d.lista===1||d.lista===2){
      const idx=d.lista-1;
      const nome=listaNomi[idx];
      const col=idx===0?'var(--c1)':'var(--c2)';
      const bg=idx===0?'var(--c1l)':'var(--c2l)';
      const prefList=d.prefs.length>0
        ? d.prefs.map((j,i)=>{
            const c=CANDS[ci][j];
            return `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--sf);border-radius:6px;margin-bottom:3px">
              <span style="min-width:18px;height:18px;border-radius:50%;background:${col};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${i+1}</span>
              <span style="font-size:12px;flex:1">${c.nome}</span>
              ${gB(c.genere)}
            </div>`;
          }).join('')
        : '<p style="font-size:11px;color:var(--tx3);padding:2px 0">Nessuna preferenza espressa</p>';
      listaBox=`<div style="background:${bg};padding:10px 12px;border-radius:var(--rs);margin-bottom:8px">
        <p style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${col};margin-bottom:5px;font-weight:600">Lista e preferenze · ${nome}</p>
        ${prefList}
      </div>`;
    }else{
      listaBox=`<div style="background:var(--sf2);padding:10px 12px;border-radius:var(--rs);margin-bottom:8px">
        <p style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:2px;font-weight:600">Lista e preferenze</p>
        <p style="font-size:13px;color:var(--tx3)">Nessun voto lista</p>
      </div>`;
    }
    riepilogoHTML=sindBox+listaBox
      +(isDisgiunto?`<div class="no nwa" style="margin-bottom:8px;font-size:12px">⚠ Voto disgiunto: sindaco e lista di schieramenti diversi</div>`:'');

  showModal(`

async function doSaveBallot(){
  closeModal();
  const d=bData;
  fd.votanti=(fd.votanti||0)+1;
  if(d.tipo==='bianca')fd.bianche=(fd.bianche||0)+1;
  else if(d.tipo==='nulla')fd.nulle=(fd.nulle||0)+1;
  else{
    // Voto sindaco
    if(d.sindaco===1)fd.vc1=(fd.vc1||0)+1;
    else if(d.sindaco===2)fd.vc2=(fd.vc2||0)+1;
    // Voto lista (separato dal sindaco!)
    if(d.lista===1)fd.vl1=(fd.vl1||0)+1;
    else if(d.lista===2)fd.vl2=(fd.vl2||0)+1;
    // Disgiunto
    if((d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista){
      fd.vd=(fd.vd||0)+1;
      if(d.sindaco===1)fd.vd12=(fd.vd12||0)+1;
      else fd.vd21=(fd.vd21||0)+1;
    }
    // Preferenze (dalla lista votata, solo se lista valida)
    if(d.lista===1||d.lista===2){
      const pk=d.lista===1?'p1':'p2';
      if(!fd[pk])fd[pk]={};
      d.prefs.forEach(j=>{fd[pk][j]=(fd[pk][j]||0)+1});
      // Accoppiate: solo se esattamente 2 preferenze
      if(d.prefs.length===2){
        const [a,b]=d.prefs;
        const keyOrd=a+'>'+b;        // ordinata (a è 1° pref, b è 2°)
        const keySet=Math.min(a,b)+'-'+Math.max(a,b);  // non ordinata
        const kOrd=d.lista===1?'coppieOrd1':'coppieOrd2';
        const kSet=d.lista===1?'coppieSet1':'coppieSet2';
        if(!fd[kOrd])fd[kOrd]={};
        if(!fd[kSet])fd[kSet]={};
        fd[kOrd][keyOrd]=(fd[kOrd][keyOrd]||0)+1;
        fd[kSet][keySet]=(fd[kSet][keySet]||0)+1;
      }
    }
  }
  // Storico ultime 10 schede
  if(!fd.lastBallots)fd.lastBallots=[];
  fd.lastBallots.push({
    num:fd.votanti,
    ts:new Date().toISOString(),
    data:JSON.parse(JSON.stringify(d))
  });
  if(fd.lastBallots.length>10)fd.lastBallots.shift();

  fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'scheda',sezione:selSez,numScheda:fd.votanti,tipoScheda:d.tipo,sindaco:d.sindaco,lista:d.lista,nPrefs:d.prefs.length,disgiunto:(d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista});
  view='sez';renSez();
  setTimeout(()=>{
    const m=$('sez-msg');
    if(m){
      const isD=(d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista;
      m.innerHTML=`<div class="no nok">Scheda #${num(fd.votanti)} salvata sul server${isD?' · voto disgiunto':''}</div>`;
      setTimeout(()=>{if(m)m.innerHTML=''},2800);
    }
  },30);
}

async function undoLast(){
  if(!fd.lastBallots||fd.lastBallots.length===0)return;
  const last=fd.lastBallots.pop();
  const d=last.data;
  fd.votanti=Math.max(0,(fd.votanti||0)-1);
  if(d.tipo==='bianca')fd.bianche=Math.max(0,(fd.bianche||0)-1);
  else if(d.tipo==='nulla')fd.nulle=Math.max(0,(fd.nulle||0)-1);
  else{
    if(d.sindaco===1)fd.vc1=Math.max(0,(fd.vc1||0)-1);
    else if(d.sindaco===2)fd.vc2=Math.max(0,(fd.vc2||0)-1);
    if(d.lista===1)fd.vl1=Math.max(0,(fd.vl1||0)-1);
    else if(d.lista===2)fd.vl2=Math.max(0,(fd.vl2||0)-1);
    if((d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista){
      fd.vd=Math.max(0,(fd.vd||0)-1);
      if(d.sindaco===1)fd.vd12=Math.max(0,(fd.vd12||0)-1);
      else fd.vd21=Math.max(0,(fd.vd21||0)-1);
    }
    if(d.lista===1||d.lista===2){
      const pk=d.lista===1?'p1':'p2';
      if(fd[pk])d.prefs.forEach(j=>{if(fd[pk][j]!==undefined)fd[pk][j]=Math.max(0,fd[pk][j]-1)});
      // Sottrai coppie
      if(d.prefs.length===2){
        const [a,b]=d.prefs;
        const keyOrd=a+'>'+b;
        const keySet=Math.min(a,b)+'-'+Math.max(a,b);
        const kOrd=d.lista===1?'coppieOrd1':'coppieOrd2';
        const kSet=d.lista===1?'coppieSet1':'coppieSet2';
        if(fd[kOrd]&&fd[kOrd][keyOrd]!==undefined)fd[kOrd][keyOrd]=Math.max(0,fd[kOrd][keyOrd]-1);
        if(fd[kSet]&&fd[kSet][keySet]!==undefined)fd[kSet][keySet]=Math.max(0,fd[kSet][keySet]-1);
      }
    }
  }
  fd.upd=new Date().toISOString();
  allData[selSez]=fd;cacheSave();
  await fbSaveSez(selSez,fd);
  fbLogEvent({tipo:'undo',sezione:selSez,numScheda:last.num});
  renSez();
}

  if(userRole==='coord'){alert('L\'annullamento schede è riservato ad admin e rappresentanti della sezione.');closeModal();return}

    else if(d.lista===2)fd.vl2=Math.max(0,(fd.vl2||0)-1);
    if((d.sindaco===1||d.sindaco===2)&&(d.lista===1||d.lista===2)&&d.sindaco!==d.lista){
      fd.vd=Math.max(0,(fd.vd||0)-1);
      if(d.sindaco===1)fd.vd12=Math.max(0,(fd.vd12||0)-1);
      else fd.vd21=Math.max(0,(fd.vd21||0)-1);
    }
    if(d.lista===1||d.lista===2){
      const pk=d.lista===1?'p1':'p2';
      if(fd[pk])d.prefs.forEach(j=>{if(fd[pk][j]!==undefined)fd[pk][j]=Math.max(0,fd[pk][j]-1)});
      // Sottrai coppie
      if(d.prefs.length===2){
        const [a,b]=d.prefs;
        const keyOrd=a+'>'+b;
        const keySet=Math.min(a,b)+'-'+Math.max(a,b);
        const kOrd=d.lista===1?'coppieOrd1':'coppieOrd2';
        const kSet=d.lista===1?'coppieSet1':'coppieSet2';
        if(fd[kOrd]&&fd[kOrd][keyOrd]!==undefined)fd[kOrd][keyOrd]=Math.max(0,fd[kOrd][keyOrd]-1);
        if(fd[kSet]&&fd[kSet][keySet]!==undefined)fd[kSet][keySet]=Math.max(0,fd[kSet][keySet]-1);

    }

    if(m){m.innerHTML=`<div class="no nok">Scheda #${sch.num} annullata (convertita in NULLA)</div>`;setTimeout(()=>{if(m)m.innerHTML=''},3000)}
  },30);

function tblRows(d){
  // Calcola massimi per heatmap
  const maxVc=Math.max(1,...Array.from({length:N},(_,i)=>Math.max(num((d[i+1]||defSez()).vc1),num((d[i+1]||defSez()).vc2))));
  const maxVl=Math.max(1,...Array.from({length:N},(_,i)=>Math.max(num((d[i+1]||defSez()).vl1),num((d[i+1]||defSez()).vl2))));
  const heatBg=(v,maxV,idx)=>{
    if(v<=0)return 'transparent';
    const intensity=Math.min(1,v/maxV);
    const alpha=(0.08+intensity*0.40).toFixed(2);
    return idx===0?`rgba(27,82,153,${alpha})`:`rgba(184,64,32,${alpha})`;
  };
  return Array.from({length:N},(_,i)=>{
    const s=d[i+1]||defSez(),el=EL[i],tv=num(s.vc1)+num(s.vc2),tvl=num(s.vl1)+num(s.vl2);
    const af=el>0?(num(s.votanti)/el*100).toFixed(1):'0.0';
    const ps1=tv>0?(num(s.vc1)/tv*100).toFixed(1):'—',ps2=tv>0?(num(s.vc2)/tv*100).toFixed(1):'—';
    const pl1=tvl>0?(num(s.vl1)/tvl*100).toFixed(1):'—',pl2=tvl>0?(num(s.vl2)/tvl*100).toFixed(1):'—';
    const bg=s.done?`<span class="badge bok">Completa</span>`:s.upd?`<span class="badge bwip">${ft(s.upd)}</span>`:`<span class="badge bwt">Attesa</span>`;
    return`<tr><td style="font-weight:600">${i+1}</td><td>${fn(s.votanti)}</td>
      <td style="background:${heatBg(num(s.vc1),maxVc,0)};font-weight:600">${fn(s.vc1)} <small style="color:var(--tx3)">${tv>0?'('+ps1+'%)':''}</small></td>
      <td style="background:${heatBg(num(s.vc2),maxVc,1)};font-weight:600">${fn(s.vc2)} <small style="color:var(--tx3)">${tv>0?'('+ps2+'%)':''}</small></td>
      <td style="background:${heatBg(num(s.vl1),maxVl,0)};font-weight:600">${fn(s.vl1)} <small style="color:var(--tx3)">${tvl>0?'('+pl1+'%)':''}</small></td>
      <td style="background:${heatBg(num(s.vl2),maxVl,1)};font-weight:600">${fn(s.vl2)} <small style="color:var(--tx3)">${tvl>0?'('+pl2+'%)':''}</small></td>
      <td>${af}%</td><td>${num(s.vd)>0?`<span style="color:var(--am)">${fn(s.vd)}</span>`:'—'}</td><td>${bg}</td></tr>`;
  }).join('');
}

    const maxVal=Math.max(1,...data.map(x=>x.v));
    return new Chart(ctx,{
      type:'bar',
      data:{labels:data.map(x=>x.n),datasets:[{data:data.map(x=>x.v),backgroundColor:col,borderRadius:3,borderSkipped:false}]},
      options:{
        indexAxis:'y',responsive:true,
        layout:{padding:{right:30}},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>' '+fn(c.parsed.x)+' voti'}}

/* ══ RENDER CONTENUTO PROIEZIONE CONSIGLIO ═════════════════ */
function renderProiezioneContent(){
  const proj=calcolaProiezione();
  const {isPareggioSindaco,isPareggioLista,sindacoVincIdx,sindacoPerdIdx,listaVincIdx,sindacoInMinoranza,seggiLista1Cons,seggiLista2Cons}=proj;

  // Soglia consiglieri per lista
  const sogliaLista=(idx)=>{
    if(isPareggioLista)return null;
    return idx===0 ? seggiLista1Cons : seggiLista2Cons;
  };

  const renderClassifica=(classifica,idx)=>{
    const soglia=sogliaLista(idx);
    const colMid=idx===0?'var(--c1m)':'var(--c2m)';
    const colDk=idx===0?'var(--c1t)':'var(--c2t)';
    const colBg=idx===0?'var(--c1l)':'var(--c2l)';
    const bgCol=idx===0?'#1B5299':'#B84020';
    const isSindVinc=!isPareggioSindaco && idx===sindacoVincIdx;
    const isSindPerd=!isPareggioSindaco && idx===sindacoPerdIdx;

    const nomeSind=idx===0?C1.nome:C2.nome;
    let sindHTML='';
    if(isSindVinc){
      sindHTML=`<div style="padding:10px 12px;background:${bgCol};color:#fff;border-radius:var(--rs);margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px">★</span>
        <div style="flex:1">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;opacity:.8">Sindaco eletto</div>
          <div style="font-size:14px;font-weight:700">${nomeSind}</div>
        </div>
        <span class="badge" style="background:rgba(255,255,255,.25);color:#fff">ELETTO</span>
      </div>`;
    }else if(isSindPerd){
      sindHTML=`<div style="padding:10px 12px;background:${colBg};border:1px solid ${bgCol};border-radius:var(--rs);margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px;color:${colMid}">◆</span>
        <div style="flex:1">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${colMid}">Consigliere di diritto (sindaco sconfitto)</div>
          <div style="font-size:14px;font-weight:700;color:${colDk}">${nomeSind}</div>
        </div>
        <span class="badge bok">ELETTO</span>
      </div>`;
    }

    const rows=classifica.map((c,pos)=>{
      const isEletto=soglia!==null && pos<soglia;
      const style=isEletto
        ? `background:${colBg};border:1px solid ${bgCol}40`
        : 'background:var(--sf);opacity:.55';
      const statusBadge=isEletto
        ?`<span class="badge bok" style="font-size:10px">✓ ELETTO</span>`
        :`<span style="font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace">—</span>`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;${style};border-radius:6px;margin-bottom:4px">
        <span style="min-width:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);font-weight:600">${pos+1}</span>
        ${gB(c.genere)}
        <span style="flex:1;font-size:12px;font-weight:${isEletto?'600':'400'};color:${isEletto?colDk:'var(--tx2)'}">${c.nome}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:${isEletto?colMid:'var(--tx3)'}">${fn(c.voti)}</span>
        ${statusBadge}
      </div>`;
    }).join('');

    const seggiLabel=soglia===null?'—':`${soglia} consiglieri${isSindVinc||isSindPerd?' + 1 sindaco':''}`;

    return `
      <div class="card" style="margin:0;padding:14px 16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;color:${colMid}">${listaNomi[idx]}</span>
          <span class="badge" style="background:${colBg};color:${colDk};font-weight:700">${seggiLabel}</span>
        </div>
        ${sindHTML}
        ${rows}
      </div>`;
  };

  if(isPareggioSindaco || isPareggioLista){
    const msg=isPareggioSindaco?'Pareggio tra candidati sindaco':'Pareggio tra le liste';
    $('proj-content').innerHTML=`
      <div class="no nwa" style="margin-bottom:10px;text-align:center;padding:1.5rem">
        <p style="font-size:14px;font-weight:600;margin-bottom:4px">⚖ ${msg}</p>
        <p style="font-size:12px">La proiezione si attiverà appena uno schieramento prevarrà sull'altro</p>
      </div>
    `;
    return;
  }

  const minoranzaAlert=sindacoInMinoranza
    ?`<div class="no nwa" style="margin-bottom:10px;text-align:center"><strong>⚠ Sindaco in minoranza</strong> — Il sindaco vincente (${sindacoVincIdx===0?C1.nome:C2.nome}) appartiene a una lista che ha preso meno voti di lista. Sarà in minoranza in consiglio (${seggiLista1Cons===5?'5':'7'} vs ${seggiLista2Cons===5?'5':'7'} consiglieri).</div>`
    :'';

  $('proj-content').innerHTML=`
    ${minoranzaAlert}
    <div style="margin-bottom:16px">${renderParlamentino(proj)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${renderClassifica(proj.classifica1,0)}
      ${renderClassifica(proj.classifica2,1)}
    </div>
    <p style="font-size:11px;color:var(--tx3);text-align:center;margin-top:10px;font-style:italic">
      ★ Sindaco eletto · ◆ Consigliere di diritto (sindaco sconfitto) · ✓ Eletto per preferenze personali · seggi consiglieri assegnati in base ai voti di LISTA
    </p>
  `;
}

  const prefsByCand=idx===0?t.p1:t.p2;

  const enriched=cands.map((c,j)=>{
    const sezionData=Array.from({length:N},(_,i)=>num((allData[i+1]||defSez())[pk]&&(allData[i+1]||defSez())[pk][j]));
    return {
      j, nome:c.nome||('Candidato '+(j+1)), genere:c.genere||'M',
      totale:prefsByCand[j]||0,
      sezioni:sezionData
    };
  });

  const sorted=[...enriched].sort((a,b)=>b.totale-a.totale);
  const totPref=sorted.reduce((sum,c)=>sum+c.totale,0);

  // Heatmap: trova il massimo per calibrare intensità sfondo celle
  const maxSingleSez=Math.max(1,...sorted.flatMap(c=>c.sezioni));

  // Funzione che genera colore di sfondo graduale proporzionale al valore
  const heatBg=(v,maxV)=>{
    if(v<=0)return 'transparent';
    const intensity=Math.min(1,v/maxV);
    // Lerp alpha 0.08 → 0.55 dal min al max
    const alpha=(0.08+intensity*0.47).toFixed(2);
    return idx===0
      ? `rgba(27,82,153,${alpha})`
      : `rgba(184,64,32,${alpha})`;
  };

  // Tabella candidato x sezione con heatmap
  const tblHdr=['Pos','Candidato','Gen','Tot','%',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))];
  const tblRowsHTML=sorted.map((c,pos)=>{
    const pctTot=totPref>0?(c.totale/totPref*100).toFixed(1)+'%':'—';
    const cells=[
      `<td style="font-weight:600;color:var(--tx3);font-family:'DM Mono',monospace">${pos+1}</td>`,
      `<td style="font-weight:500">${c.nome}</td>`,
      `<td>${gB(c.genere)}</td>`,
      `<td style="font-weight:700;color:${col};font-family:'DM Mono',monospace">${fn(c.totale)}</td>`,
      `<td style="color:var(--tx3);font-family:'DM Mono',monospace;font-size:11px">${pctTot}</td>`,
      ...c.sezioni.map(v=>{
        const bg=heatBg(v,maxSingleSez);
        const tc=v>=maxSingleSez*0.6?'#fff':(v>0?(idx===0?'var(--c1t)':'var(--c2t)'):'var(--tx3)');
        return `<td style="font-family:'DM Mono',monospace;background:${bg};color:${tc};font-weight:${v>0?'600':'400'};text-align:center">${v>0?fn(v):'—'}</td>`;
      })
    ];
    return `<tr>${cells.join('')}</tr>`;
  }).join('');

  const sezTotals=Array.from({length:N},(_,i)=>sorted.reduce((sum,c)=>sum+c.sezioni[i],0));
  const totalRow=`<tr style="background:${colBg};font-weight:600">
    <td></td>
    <td style="color:${colMid}">TOTALE</td>
    <td></td>
    <td style="color:${col};font-family:'DM Mono',monospace">${fn(totPref)}</td>
    <td></td>
    ${sezTotals.map(v=>`<td style="color:${colMid};font-family:'DM Mono',monospace;text-align:center">${fn(v)}</td>`).join('')}
  </tr>`;

  // ═══ TOP TICKET ═══
  // Accoppiate ordinate (primo → secondo)
  const coppieOrd=idx===0?t.coppieOrd1:t.coppieOrd2;
  const coppieSet=idx===0?t.coppieSet1:t.coppieSet2;

  const coppieOrdList=Object.entries(coppieOrd||{})
    .map(([k,v])=>{
      const [a,b]=k.split('>').map(n=>parseInt(n));
      return {a,b,voti:num(v),candA:cands[a],candB:cands[b]};
    })
    .filter(x=>x.candA&&x.candB&&x.voti>0)
    .sort((a,b)=>b.voti-a.voti)
    .slice(0,10);

  const coppieSetList=Object.entries(coppieSet||{})
    .map(([k,v])=>{
      const [a,b]=k.split('-').map(n=>parseInt(n));
      return {a,b,voti:num(v),candA:cands[a],candB:cands[b]};
    })
    .filter(x=>x.candA&&x.candB&&x.voti>0)
    .sort((a,b)=>b.voti-a.voti)
    .slice(0,10);

  // Classifica singoli (top 10)
  const singoliList=sorted.slice(0,10).filter(c=>c.totale>0);

  const mkTicketRow=(c,pos,isCouple)=>{
    if(isCouple){
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${colBg};border:1px solid ${idx===0?'#A8CAEA':'#EAB8A8'};border-radius:var(--rs);margin-bottom:6px">
        <span style="min-width:24px;height:24px;border-radius:50%;background:${col};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'DM Mono',monospace">${pos+1}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:${idx===0?'var(--c1t)':'var(--c2t)'};display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span>${c.candA.nome}</span>${gB(c.candA.genere)}
            <span style="color:${colMid}">+</span>
            <span>${c.candB.nome}</span>${gB(c.candB.genere)}
          </div>
        </div>
        <div style="font-size:18px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${fn(c.voti)}</div>
      </div>`;
    }
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${colBg};border:1px solid ${idx===0?'#A8CAEA':'#EAB8A8'};border-radius:var(--rs);margin-bottom:6px">
      <span style="min-width:24px;height:24px;border-radius:50%;background:${col};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'DM Mono',monospace">${pos+1}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:${idx===0?'var(--c1t)':'var(--c2t)'}">${c.nome}</div>
        <div style="font-size:11px;color:${colMid};display:flex;align-items:center;gap:5px">${gB(c.genere)} ${totPref>0?(c.totale/totPref*100).toFixed(1)+'% della lista':''}</div>
      </div>
      <div style="font-size:20px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${fn(c.totale)}</div>
    </div>`;
  };

  const tabSingoli=singoliList.length>0
    ? singoliList.map((c,i)=>mkTicketRow(c,i,false)).join('')
    : `<p style="font-size:12px;color:var(--tx3);padding:10px 0;text-align:center">Nessuna preferenza registrata</p>`;

  const tabOrd=coppieOrdList.length>0
    ? coppieOrdList.map((c,i)=>mkTicketRow(c,i,true)).join('')
    : `<p style="font-size:12px;color:var(--tx3);padding:10px 0;text-align:center">Nessuna accoppiata registrata<br><small>richiede schede con 2 preferenze</small></p>`;

  const tabSet=coppieSetList.length>0
    ? coppieSetList.map((c,i)=>mkTicketRow(c,i,true)).join('')
    : `<p style="font-size:12px;color:var(--tx3);padding:10px 0;text-align:center">Nessuna accoppiata registrata<br><small>richiede schede con 2 preferenze</small></p>`;

  $('root').className='wide';
  $('root').innerHTML=`
    <div class="tb">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn" onclick="goHome()">← Torna</button>
        <div>
          <div class="tb-t" style="color:${colMid}">${listName}</div>
          <div class="tb-s">${candNome} · ${fn(totPref)} preferenze totali · <span id="live-clk"></span></div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="card" style="margin:0">
        <span class="ct" style="color:${colMid}">classifica preferenze</span>
        <canvas id="ch-list" height="260"></canvas>
      </div>
      <div class="card" style="margin:0">
        <div style="display:flex;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;margin-bottom:12px">
          <button class="tk-tab tk-active" data-tab="singoli" onclick="setTicketTab('singoli',${idx})" style="flex:1;padding:8px;border:none;background:${col};color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Singoli</button>
          <button class="tk-tab" data-tab="ord" onclick="setTicketTab('ord',${idx})" style="flex:1;padding:8px;border:none;background:var(--sf);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Accoppiate ordinate</button>
          <button class="tk-tab" data-tab="set" onclick="setTicketTab('set',${idx})" style="flex:1;padding:8px;border:none;background:var(--sf);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Accoppiate</button>
        </div>
        <div id="tk-singoli" style="display:block">${tabSingoli}</div>
        <div id="tk-ord" style="display:none">${tabOrd}</div>
        <div id="tk-set" style="display:none">${tabSet}</div>
        <p id="tk-info" style="font-size:10px;color:var(--tx3);margin-top:8px;line-height:1.4">Classifica dei candidati più votati singolarmente.</p>
      </div>
    </div>

    <div class="card">
      <span class="ct" style="color:${colMid}">dettaglio candidato × sezione · heatmap</span>
      <p style="font-size:11px;color:var(--tx3);margin-bottom:10px">le celle sono colorate in base all'intensità del voto (più scuro = più voti)</p>
      <div style="overflow-x:auto">
        <table class="tbl" style="min-width:700px">
          <thead><tr>${tblHdr.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${tblRowsHTML}${totalRow}</tbody>
        </table>
      </div>
    </div>

    <div class="io" style="margin-top:8px">
      <button class="btn bg" onclick="exportListCSV(${idx})">📊 Esporta CSV lista</button>
      <button class="btn" onclick="showDash()">Dashboard Generale</button>
      <button class="btn" onclick="showListDash(${idx===0?1:0})">Dashboard ${listaNomi[idx===0?1:0]}</button>
    </div>
  `;

  startClock();

  // Chart classifica con data labels e tutti i candidati
  const ctx=$('ch-list');
  if(ctx){
    if(charts.list)charts.list.destroy();
    const chartData=sorted.map(c=>c.totale);
    const maxVal=Math.max(1,...chartData);
    charts.list=new Chart(ctx,{
      type:'bar',
      data:{
        labels:sorted.map(c=>{
          const n=c.nome;
          return n.length>22?n.slice(0,20)+'…':n;
        }),
        datasets:[{data:chartData,backgroundColor:colHex,borderRadius:3,borderSkipped:false}]
      },
      options:{
        indexAxis:'y',responsive:true,
        layout:{padding:{right:30}},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>' '+fn(c.parsed.x)+' preferenze'}}
        },
        scales:{
          x:{display:false,beginAtZero:true,max:maxVal*1.1},
          y:{grid:{display:false},ticks:{font:{size:11},color:'#444'}}
        }
      },
      plugins:[{
        id:'dataLabels',
        afterDatasetsDraw(chart){
          const {ctx,data,scales:{x,y}}=chart;
          ctx.save();
          ctx.font="600 11px 'DM Mono', monospace";
          ctx.fillStyle=colHex;
          ctx.textBaseline='middle';
          data.datasets[0].data.forEach((val,i)=>{
            if(val>0){
              const px=x.getPixelForValue(val);
              const py=y.getPixelForValue(i);
              ctx.fillText(' '+fn(val),px+4,py);
            }
          });
          ctx.restore();
        }
      }]
    });
  }
}

// Switch tab del widget Top Ticket
function setTicketTab(tab,idx){
  const col=idx===0?'#1B5299':'#B84020';
  ['singoli','ord','set'].forEach(t=>{
    const pane=$('tk-'+t);if(pane)pane.style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.tk-tab').forEach(btn=>{
    const isActive=btn.dataset.tab===tab;
    btn.style.background=isActive?col:'var(--sf)';
    btn.style.color=isActive?'#fff':'var(--tx2)';
  });
  const info=$('tk-info');
  if(info){
    if(tab==='singoli')info.textContent='Classifica dei candidati più votati singolarmente.';
    else if(tab==='ord')info.textContent='Accoppiate dove l\'ordine conta: 1ª + 2ª preferenza sulla stessa scheda. Solo schede con 2 preferenze.';
    else info.textContent='Accoppiate senza ordine: coppie di candidati che appaiono insieme, indipendentemente dalla posizione. Solo schede con 2 preferenze.';
  }
}

function exportListCSV(idx){
  const listName=listaNomi[idx];
  const cands=CANDS[idx]||[];
  const pk=idx===0?'p1':'p2';
  const t=totals(allData);
  const prefsByCand=idx===0?t.p1:t.p2;
  const q=v=>`"${String(v).replace(/"/g,'""')}"`;

  const enriched=cands.map((c,j)=>({
    nome:c.nome||('Candidato '+(j+1)),genere:c.genere||'M',totale:prefsByCand[j]||0,
    sezioni:Array.from({length:N},(_,i)=>num((allData[i+1]||defSez())[pk]&&(allData[i+1]||defSez())[pk][j]))
  })).sort((a,b)=>b.totale-a.totale);

  const rows=[];
  rows.push(['LISTA '+listName+' — '+COMUNE,'Data: '+DATA_EL,'Generato: '+new Date().toLocaleString('it-IT')].join(','));
  rows.push('');
  rows.push(['Posizione','Candidato','Genere','Totale',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))].join(','));
  enriched.forEach((c,pos)=>{
    rows.push([pos+1,q(c.nome),c.genere,c.totale,...c.sezioni].join(','));
  });

  const csv='\uFEFF'+rows.join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='lista_'+listName.toLowerCase().replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  fbLogEvent({tipo:'export_lista_csv',lista:idx});
}

/* ══ EXPORT CSV ═════════════════════════════════════════════ */
function exportCSV(){
  const d=allData,t=totals(d),q=v=>`"${String(v).replace(/"/g,'""')}"`;
  const rows=[];
  rows.push(['ELEZIONI COMUNALI — '+COMUNE,'Data: '+DATA_EL,'Generato: '+new Date().toLocaleString('it-IT')].join(','));
  rows.push('');rows.push('=== RIEPILOGO GENERALE ===');
  rows.push(['Elettori totali',t.el,''].join(','));
  rows.push(['Votanti',t.vt,pct(t.aff)+' affluenza'].join(','));
  rows.push(['Bianche',t.bi,''].join(','));rows.push(['Nulle',t.nu,''].join(','));
  rows.push(['Voti validi sindaco',t.tv,''].join(','));
  rows.push(['Voti validi lista',t.tvl,''].join(','));
  rows.push(['Voti disgiunti',t.vd,''].join(','));
  rows.push('');rows.push('=== VOTI SINDACO ===');
  rows.push([q(C1.nome+' ('+listaNomi[0]+')'),t.vc1,pct(t.pc1)].join(','));
  rows.push([q(C2.nome+' ('+listaNomi[1]+')'),t.vc2,pct(t.pc2)].join(','));
  rows.push('');rows.push('=== VOTI LISTA ===');
  rows.push([q(listaNomi[0]),t.vl1,pct(t.pl1)].join(','));
  rows.push([q(listaNomi[1]),t.vl2,pct(t.pl2)].join(','));
  rows.push('');rows.push('=== DETTAGLIO PER SEZIONE ===');
  rows.push(['Sezione','Elettori','Votanti','Affluenza%','Bianche','Nulle',
    q('Sind '+C1.nome),q('Sind '+C2.nome),
    q('Lista '+listaNomi[0]),q('Lista '+listaNomi[1]),
    'Disgiunti','Stato'].join(','));
  for(let i=1;i<=N;i++){
    const s=d[i]||defSez(),el=EL[i-1],af=el>0?(num(s.votanti)/el*100).toFixed(2):'0.00';
    rows.push([i,el,num(s.votanti),af,num(s.bianche),num(s.nulle),
      num(s.vc1),num(s.vc2),num(s.vl1),num(s.vl2),
      num(s.vd),s.done?'Completata':s.upd?'Parziale':'Attesa'].join(','));
  }
  for(let li=0;li<2;li++){
    rows.push('');rows.push(`=== PREFERENZE LISTA ${listaNomi[li]} ===`);
    rows.push(['Candidato','Genere','Totale',...Array.from({length:N},(_,i)=>'Sez.'+(i+1))].join(','));
    for(let j=0;j<12;j++){
      const cand=CANDS[li][j]||{nome:'Candidato '+(j+1),genere:'M'};
      const pk=li===0?'p1':'p2';
      const sv=Array.from({length:N},(_,i)=>num((d[i+1]||defSez())[pk]&&(d[i+1]||defSez())[pk][j]));
      rows.push([q(cand.nome),cand.genere||'M',sv.reduce((a,b)=>a+b,0),...sv].join(','));
    }
  }
  // Proiezione consiglio
  const proj=calcolaProiezione();
  if(!proj.isPareggioSindaco && !proj.isPareggioLista){
    rows.push('');rows.push('=== PROIEZIONE CONSIGLIO COMUNALE ===');
    rows.push(['Sindaco eletto',q(proj.sindacoVincIdx===0?C1.nome:C2.nome),''].join(','));
    rows.push(['Lista vincente (per voti lista)',q(listaNomi[proj.listaVincIdx]),''].join(','));
    if(proj.sindacoInMinoranza){
      rows.push(['ATTENZIONE','Sindaco in minoranza in consiglio',''].join(','));
    }
    rows.push(['Seggi '+listaNomi[0],proj.seggiTotali1,'(consiglieri+sindaco)'].join(','));
    rows.push(['Seggi '+listaNomi[1],proj.seggiTotali2,'(consiglieri+sindaco)'].join(','));
  }
  const csv='\uFEFF'+rows.join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='risultati_'+COMUNE.toLowerCase()+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  fbLogEvent({tipo:'export_csv'});
}
function exportJSON(){
  const exp={};for(let i=1;i<=N;i++)exp['sez_'+i]=allData[i]||defSez();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({comune:COMUNE,exportedAt:new Date().toISOString(),sezioni:exp,cands:CANDS,liste:listaNomi},null,2)],{type:'application/json'}));
  a.download='elezioni_'+COMUNE.toLowerCase()+'_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  fbLogEvent({tipo:'export_json'});
}
async function resetAll(){
  if(userRole!=='admin'){alert('Solo l\'admin può cancellare tutti i dati.');return}
  if(!confirm('Cancellare TUTTI i dati di scrutinio dal SERVER? Azione irreversibile e impatta TUTTI i dispositivi.'))return;
  if(!confirm('Ultima conferma: questo cancella i dati da tutti i dispositivi collegati. Un backup di sicurezza verrà creato automaticamente prima del reset. Continuo?'))return;
  makeBackup('pre-reset');
  for(let i=1;i<=N;i++){await fbSaveSez(i,defSez())}
  fbLogEvent({tipo:'reset_all',ruolo:userRole});
  alert('Dati azzerati. Un backup è disponibile nella sezione Backup per il ripristino.');
  goHome();
}
